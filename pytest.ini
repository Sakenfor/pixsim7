[pytest]
testpaths =
    pixsim7/backend/tests
    scripts/seeds/game/bananza/tests
    tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra
markers =
    unit: isolated unit tests with no external dependencies
    integration: cross-component or end-to-end integration tests
    slow: long-running tests
    api: API endpoint contract tests
    service: service-layer behavior tests
    domain: schema/model/contract tests
    cli: command-line or script-level tests
    project_bundle: project bundle lifecycle/import/export tests
    ownership: ownership and access-scope tests
    runtime_meta: runtime metadata canonicalization tests
