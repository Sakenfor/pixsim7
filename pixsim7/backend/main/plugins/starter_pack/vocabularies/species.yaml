# Species Vocabulary
# Anatomy/movement mappings per species for character binding expansion
# word_lists: graded low→high intensity, resolved via {{role.key}} placeholders
version: "1.2.0"

species:
  species:human:
    label: "Human"
    category: humanoid
    anatomy_map:
      limbs: "hands"
      grip: "fingers"
      stance: "standing upright"
      feet: "feet"
      forelimbs: "arms"
      tail: ""
      muzzle: ""
      pelt: ""
    movement_verbs: [walks, steps, strides, runs, jogs, paces]
    pronoun_set:
      subject: "they"
      object: "them"
      possessive: "their"
    default_stance: "standing upright"
    keywords: [human, person, man, woman]
    word_lists:
      # Audio / vocal cues — graded low → high intensity
      vocal_pleasure: [sighs softly, whimpers, mo_a-ns, cries out, scr_ea-ms]
      vocal_pain: [winces, hisses, gru_nt-s, yelps, cries out]
      vocal_surprise: [blinks, ga_sp-s, squeaks, shrieks]
      vocal_effort: [exhales, gru_nt-s, strains, gro_an-s]
      breath: [steady breath, quickened breath, heavy breath, pan_ti-ng, ga_sp-ing]
      vocal_delivery: [whispers, murmurs, says, ga_sp-s, cries]
      utterance: ["oh...", "oh my...", "oh god...", "oh my god", "don't stop"]
      # Physical / body language
      posture: [relaxed, attentive, tense, braced, ri_gi-d]
      touch: [barely brushes, lightly touches, presses, grips firmly, clamps down]
      muscle: [relaxed, flexing slightly, taut, straining, tre_mb-ling]

