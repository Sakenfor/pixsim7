    value_aliases: {}
    applies_to:
      - role: style
        category: wardrobe
    status: active

  silhouette:
    label: "Silhouette"
    description: "Legacy broad wardrobe-outline descriptor. Prefer explicit garment-specific shape/fit axes for new content."
    data_type: string
    allowed_values: [preserve, fitted, accentuated]
    aliases: []
    value_aliases: {}
    applies_to:
      - role: style
        category: wardrobe
    status: deprecated

  tightness:
    label: "Tightness"
