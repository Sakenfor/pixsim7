    value_aliases: {}
    applies_to:
      - role: lighting
        category: composition
    status: active

  light_intensity:
    label: "Light Intensity"
    description: "Overall intensity tier of key lighting."
    data_type: string
    allowed_values: [medium, high]
    aliases: [intensity]
    value_aliases: {}
    applies_to:
      - role: lighting
        category: composition
    status: active

  light_contrast:
    label: "Light Contrast"
    description: "Overall contrast tier for the lighting setup."
    data_type: string
