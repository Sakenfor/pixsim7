# Composition Roles Vocabulary — Hierarchical
# Two-level hierarchy: group (Level 1) + leaf (Level 2)
# Old flat IDs preserved as aliases for backward compatibility.
version: "2.0.0"

roles:
  # =========================================================================
  # ENTITIES (blue) — things in the scene
  # =========================================================================
  role:entities:
    label: "Entities"
    description: "Things in the scene — characters, creatures, objects"
    color: blue
    is_group: true
    default_layer: 1
    default_influence: content
    tags: [character, subject, object]

  role:entities:subject:
    label: "Subject"
    description: "Preservation-locked reference subject for image-edit"
    color: blue
    default_layer: 1
    default_influence: content
    slots:
      provides: [slot:focal_subject]
      requires: []
    tags: [subject, preserve, lock]
    aliases: [subject]

  role:entities:main_character:
    label: "Main Character"
    description: "Primary subject/character in the scene"
    color: blue
    default_layer: 1
    default_influence: content
    slots:
      provides: [slot:focal_subject, slot:character_presence]
      requires: []
    tags: [character, subject, primary]
    aliases: [main_character, character, char, hero]

  role:entities:companion:
    label: "Companion"
    description: "Supporting characters (NPCs, pets, monsters)"
    color: blue
    default_layer: 1
    default_influence: content
    slots:
      provides: [slot:secondary_subject, slot:character_presence]
      requires: []
    tags: [character, secondary, npc]
    aliases: [companion, npc, monster]

  role:entities:placed:
    label: "Placed Character"
    description: "Positioned secondary character in the scene"
    color: blue
    default_layer: 1
    default_influence: content
    slots:
      provides: [slot:secondary_subject, slot:character_presence]
      requires: [slot:spatial_context]
    tags: [character, placed, positioned]
    aliases: [placement]

  role:entities:prop:
    label: "Prop"
    description: "Objects, vehicles, items"
    color: blue
    default_layer: 1
    default_influence: content
    slots:
      provides: [slot:scene_prop]
      requires: [slot:spatial_context]
    tags: [object, item, prop]
    aliases: [prop, object, vehicle]

  # =========================================================================
  # WORLD (green) — the space/location
  # =========================================================================
  role:world:
    label: "World"
    description: "The space, location, and broader setting"
    color: green
    is_group: true
    default_layer: 0
    default_influence: content
    tags: [background, setting, location]

  role:world:environment:
    label: "Environment"
    description: "Background, setting, location"
    color: green
    default_layer: 0
    default_influence: content
    slots:
      provides: [slot:scene_setting, slot:spatial_context]
      requires: []
    tags: [background, setting, location]
    aliases: [environment, setting, background, bg, scene]

  role:world:setting:
    label: "Setting"
    description: "Broader location, time period, or world context"
    color: green
    default_layer: 0
    default_influence: content
    slots:
      provides: [slot:scene_setting]
      requires: []
    tags: [setting, world, period]
    aliases: []

  # =========================================================================
  # CAMERA (slate) — viewpoint
  # =========================================================================
  role:camera:
    label: "Camera"
    description: "Viewpoint and framing controls"
    color: slate
    is_group: true
    default_layer: 2
    default_influence: blend
    tags: [camera, viewpoint, framing]

  role:camera:angle:
    label: "Camera Angle"
    description: "Viewpoint direction (low angle, bird's eye, etc.)"
    color: slate
    default_layer: 2
    default_influence: blend
    slots:
      provides: [slot:visual_effect]
      requires: []
    tags: [camera, angle, viewpoint]
    aliases: []

  role:camera:fov:
    label: "Field of View"
    description: "Field of view / focal length"
    color: slate
    default_layer: 2
    default_influence: blend
    slots:
      provides: [slot:visual_effect]
      requires: []
    tags: [camera, fov, lens]
    aliases: []

  role:camera:composition:
    label: "Composition"
    description: "Layer ordering, depth arrangement"
    color: slate
    default_layer: 2
    default_influence: blend
    slots:
      provides: [slot:visual_effect]
      requires: []
    tags: [camera, composition, depth]
    aliases: [composition]

  # =========================================================================
  # LIGHTING (amber) — light sources
  # =========================================================================
  role:lighting:
    label: "Lighting"
    description: "Light sources and illumination"
    color: amber
    is_group: true
    default_layer: 2
    default_influence: blend
    tags: [lighting, light]

  role:lighting:key:
    label: "Key Light"
    description: "Primary light source"
    color: amber
    default_layer: 2
    default_influence: blend
    slots:
      provides: [slot:visual_effect]
      requires: []
    tags: [lighting, key, primary]
    aliases: [lighting]

  role:lighting:fill:
    label: "Fill Light"
    description: "Secondary/fill light source"
    color: amber
    default_layer: 2
    default_influence: blend
    slots:
      provides: [slot:visual_effect]
      requires: []
    tags: [lighting, fill, secondary]
    aliases: []

  # =========================================================================
  # MATERIALS (pink) — visual treatment
  # =========================================================================
  role:materials:
    label: "Materials"
    description: "Visual treatment, style, and aesthetic"
    color: pink
    is_group: true
    default_layer: 0
    default_influence: style
    tags: [style, material, aesthetic]

  role:materials:wardrobe:
    label: "Wardrobe"
    description: "Clothing, armor, accessories"
    color: pink
    default_layer: 0
    default_influence: style
    slots:
      provides: [slot:aesthetic_guidance]
      requires: []
    tags: [wardrobe, clothing, outfit]
    aliases: []

  role:materials:rendering:
    label: "Rendering Style"
    description: "Render style, art direction, aesthetic reference"
    color: pink
    default_layer: 0
    default_influence: style
    slots:
      provides: [slot:aesthetic_guidance]
      requires: []
    tags: [style, reference, aesthetic, rendering]
    aliases: [style_reference, style, reference]

  role:materials:atmosphere:
    label: "Atmosphere"
    description: "Emotional tone, mood, ambiance"
    color: pink
    default_layer: 0
    default_influence: style
    slots:
      provides: [slot:aesthetic_guidance]
      requires: []
    tags: [mood, atmosphere, tone]
    aliases: []

  role:materials:romance:
    label: "Romance"
    description: "Intimate/romantic visual treatment"
    color: pink
    default_layer: 0
    default_influence: style
    slots:
      provides: [slot:aesthetic_guidance]
      requires: []
    tags: [romance, intimate]
    aliases: []

  # =========================================================================
  # ANIMATION (cyan) — movement/behavior
  # =========================================================================
  role:animation:
    label: "Animation"
    description: "Movement, behavior, and pose directives"
    color: cyan
    is_group: true
    default_layer: 2
    default_influence: blend
    tags: [animation, movement, action]

  role:animation:action:
    label: "Action"
    description: "Actions, interactions, movement behaviors"
    color: cyan
    default_layer: 2
    default_influence: blend
    slots:
      provides: [slot:visual_effect]
      requires: []
    tags: [action, interaction, movement]
    aliases: [effect]

  role:animation:pose:
    label: "Pose"
    description: "Static pose or body position"
    color: cyan
    default_layer: 2
    default_influence: blend
    slots:
      provides: [slot:visual_effect]
      requires: []
    tags: [pose, position, stance]
    aliases: []

# Priority order for role selection (highest first)
# Groups are excluded — only leaf roles participate in conflict resolution
priority:
  - role:entities:subject
  - role:entities:main_character
  - role:entities:companion
  - role:entities:placed
  - role:entities:prop
  - role:materials:rendering
  - role:materials:wardrobe
  - role:materials:atmosphere
  - role:materials:romance
  - role:camera:angle
  - role:camera:fov
  - role:camera:composition
  - role:lighting:key
  - role:lighting:fill
  - role:animation:action
  - role:animation:pose
  - role:world:environment
  - role:world:setting

# Tag slug -> role mapping (exact match)
slug_mappings:
  bg: role:world:environment
  "role:bg": role:world:environment
  "role:environment": role:world:environment
  "role:setting": role:world:setting
  "char:hero": role:entities:main_character
  "pov:player": role:entities:main_character
  "role:char": role:entities:main_character
  "role:character": role:entities:main_character
  "char:npc": role:entities:companion
  "char:monster": role:entities:companion
  comic_frame: role:materials:rendering
  # Camera tag-value refinements (key:value slug format)
  "camera:fov": role:camera:fov
  "camera:camera_lock": role:camera:composition
  "camera:camera_stability": role:camera:composition
  "camera:framing": role:camera:composition
  "camera:depth": role:camera:composition

# Tag namespace -> role mapping (prefix match)
namespace_mappings:
  character: role:entities:main_character
  person: role:entities:main_character
  npc: role:entities:main_character
  animal: role:entities:companion
  creature: role:entities:companion
  object: role:entities:prop
  prop: role:entities:prop
  vehicle: role:entities:prop
  location: role:world:environment
  environment: role:world:environment
  setting: role:world:environment
  background: role:world:environment
  scene: role:world:environment
  place: role:world:environment
  style: role:materials:rendering
  rendering_technique: role:materials:rendering
  form_language: role:materials:rendering
  aesthetic_preset: role:materials:rendering
  lighting: role:lighting:key
  camera: role:camera:angle
  # Tag-key inference: lock-type tags → entities:subject
  pose: role:entities:subject
  lock: role:entities:subject
  identity_lock: role:entities:subject
  framing_lock: role:entities:subject
  clothing_lock: role:entities:subject
  # Primitive category fallbacks
  light: role:lighting:key
  color: role:materials:atmosphere
  character_pose: role:entities:subject
  anatomy: role:entities:main_character

# Category -> composition role mapping (block category refinement)
# Used by inference when a block's category narrows the composition role
# beyond the default prompt-role mapping.
category_mappings:
  # Action refinements (default: animation:action)
  hold_attitude: role:animation:pose
  # Character refinements (default: entities:main_character)
  creature: role:entities:companion
  # Camera refinements (default: camera:angle)
  fov: role:camera:fov
  camera_lock: role:camera:composition
  camera_stability: role:camera:composition
  framing: role:camera:composition
  depth: role:camera:composition
  # Lighting refinements (default: lighting:key)
  fill: role:lighting:fill
  # Style refinements (default: materials:rendering)
  atmosphere: role:materials:atmosphere
  wardrobe: role:materials:wardrobe
  rendering: role:materials:rendering
  rendering_technique: role:materials:rendering
  form_language: role:materials:rendering
  aesthetic_preset: role:materials:rendering
  # Composition
  layer_order: role:camera:composition
  # Primitive category → role (no prompt-role context)
  light: role:lighting:key
  color: role:materials:atmosphere
  environment: role:world:environment
  location: role:world:environment
  character_pose: role:entities:subject
  pose: role:entities:subject
  anatomy: role:entities:main_character
