# Anatomy Vocabulary
# Body parts and regions for labeling and composition.
#
# The `intimate_*` categories group Latin-nomenclature parts for adult/erotic
# prompt contexts. They share the file because the loader is one-YAML-per-vocab,
# but the category prefix makes them cleanly separable if we ever migrate them
# to their own pack/DB.
version: "1.0.0"

categories:
  general: "General body areas"
  specific: "Specific anatomical parts"
  appearance: "Appearance-related"
  intimate_female: "Female intimate anatomy (Latin nomenclature)"
  intimate_male: "Male intimate anatomy (Latin nomenclature)"
  intimate_shared: "Shared intimate regions (Latin nomenclature)"

# Unified parts (combines legacy anatomy_parts + anatomy_regions + common labels)
