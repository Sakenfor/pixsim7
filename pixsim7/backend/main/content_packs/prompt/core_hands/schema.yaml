version: 1.0.0
package_name: core_hands
defaults:
  is_public: true
  source: system
blocks:
  - id: hands
    block_schema:
      id_prefix: core.subject.hands
      category: character_pose
      capabilities:
        - subject.hands
      text_template: 'Hands token: {variant}.'
      projection_hints:
        boost: 1.25
      tags:
        modifier_family: hands
        modality_support: both
        temporal: neutral
        hands_context_synonyms:
          - hand
          - hands
          - finger
          - fingers
          - palm
          - palms
          - fist
          - fists
          - knuckle
          - knuckles
          - wrist
          - wrists
          - gesture
          - gestures
          - gesturing
          - gestured
          - point
          - points
          - pointing
          - pointed
          - grip
          - grips
          - gripping
          - gripped
          - grasp
          - grasps
          - grasping
          - grasped
          - clench
          - clenches
          - clenching
          - clenched
          - wave
          - waves
          - waving
          - waved
          - clap
          - clapping
          - applaud
          - applauds
          - applauding
      op:
        op_id: subject.hands.set
        signature_id: subject.hands.v1
        modalities:
          - both
        refs:
          - key: subject
            capability: subject
            required: false
          - key: target
            capability: target
            required: false
        params:
          - key: visibility
            tag_key: hands_visibility
            type: enum
            enum:
              - visible
              - hidden
            default: visible
          - key: gesture
            tag_key: hands_gesture
            type: enum
            enum:
              - neutral
              - open
              - fist
              - point
              - reach
              - hold_object
            default: neutral
          - key: target_ref
            required: false
            type: ref
            ref_capability: target
        default_args:
          visibility: visible
          gesture: neutral
      variants:
        - key: hands_visible_neutral
          op_args:
            visibility: visible
            gesture: neutral
        - key: hands_hidden
          op_args:
            visibility: hidden
            gesture: neutral
        - key: hands_open
          op_args:
            visibility: visible
            gesture: open
        - key: hands_point
          op_args:
            visibility: visible
            gesture: point
        - key: hands_hold_object
          op_args:
            visibility: visible
            gesture: hold_object
