version: 1.0.0
package_name: core_pov
defaults:
  is_public: true
  source: system
blocks:
  - id: pov
    block_schema:
      id_prefix: core.camera.pov
      category: camera
      capabilities:
        - camera.pov
      text_template: 'POV token: {variant}.'
      tags:
        modifier_family: pov
        modality_support: both
        temporal: neutral
      op:
        op_id: camera.pov.set
        signature_id: camera.pov.v1
        modalities:
          - both
        refs:
          - key: subject
            capability: subject
            required: false
          - key: target
            capability: target
            required: false
        params:
          - key: perspective
            type: enum
            default: first_person
            enum:
              - first_person
              - over_shoulder
              - third_person
              - observer
              - top_down
            tag_key: pov_perspective
          - key: camera_height
            type: enum
            default: eye_level
            enum:
              - ground
              - waist
              - chest
              - eye_level
              - overhead
            tag_key: pov_height
          - key: target_ref
            type: ref
            required: false
            ref_capability: target
        default_args:
          perspective: first_person
          camera_height: eye_level
      variants:
        - key: first_person_eye_level
          op_args:
            perspective: first_person
            camera_height: eye_level
        - key: first_person_waist
          op_args:
            perspective: first_person
            camera_height: waist
        - key: over_shoulder
          op_args:
            perspective: over_shoulder
            camera_height: chest
        - key: third_person_follow
          op_args:
            perspective: third_person
            camera_height: chest
        - key: observer_top_down
          op_args:
            perspective: top_down
            camera_height: overhead
