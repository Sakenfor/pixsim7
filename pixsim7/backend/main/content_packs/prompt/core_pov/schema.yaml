version: 1.0.0
package_name: core_pov
defaults:
  is_public: true
  source: system
blocks:
  - id: pov
    block_schema:
      id_prefix: core.camera.pov
      category: camera
      capabilities:
        - camera.pov
      text_template: 'POV token: {variant}.'
      tags:
        modifier_family: pov
        modality_support: both
        temporal: neutral
      op:
        op_id: camera.pov.set
        modalities:
          - both
        refs:
          - key: subject
            capability: subject
            required: false
          - key: target
            capability: target
            required: false
        params:
          - key: perspective
            type: enum
            enum:
              - first_person
              - over_shoulder
              - third_person
              - observer
              - top_down
            default: first_person
          - key: camera_height
            type: enum
            enum:
              - ground
              - waist
              - chest
              - eye_level
              - overhead
            default: eye_level
          - key: target_ref
            required: false
            type: ref
            ref_capability: target
        default_args:
          perspective: first_person
          camera_height: eye_level
      variants:
        - key: first_person_eye_level
          tags:
            pov_perspective: first_person
            pov_height: eye_level
          op_args:
            perspective: first_person
            camera_height: eye_level
        - key: first_person_waist
          tags:
            pov_perspective: first_person
            pov_height: waist
          op_args:
            perspective: first_person
            camera_height: waist
        - key: over_shoulder
          tags:
            pov_perspective: over_shoulder
            pov_height: chest
          op_args:
            perspective: over_shoulder
            camera_height: chest
        - key: third_person_follow
          tags:
            pov_perspective: third_person
            pov_height: chest
          op_args:
            perspective: third_person
            camera_height: chest
        - key: observer_top_down
          tags:
            pov_perspective: top_down
            pov_height: overhead
          op_args:
            perspective: top_down
            camera_height: overhead
