version: 1.0.0
package_name: core_camera
defaults:
  is_public: true
  source: system
blocks:
  - id: motion
    block_schema:
      id_prefix: core.camera.motion
      category: camera
      capabilities:
        - camera.motion
      text_template: 'Camera motion token: {variant}.'
      tags:
        modifier_family: camera_motion
        temporal: dynamic
      op:
        op_id_template: camera.motion.{variant}
        signature_id: camera.motion.v1
        modalities:
          - video
        refs:
          - key: target
            capability: camera_target
            required: false
        params:
          - key: speed
            type: enum
            enum:
              - slow
              - normal
              - fast
            default: normal
          - key: direction
            type: enum
            enum:
              - in
              - out
              - left
              - right
              - up
              - down
              - forward
              - backward
              - around
              - none
            default: none
        default_args:
          speed: normal
          direction: none
      variants:
        - key: zoom
          tags:
            camera_motion: zoom
            modality_support: both
            image_surface: zoomed-in framing
            video_surface: camera zooms
          op_modalities:
            - both
          op_args:
            direction: in
        - key: pan
          tags:
            camera_motion: pan
            modality_support: video
            image_surface: lateral framing emphasis
            video_surface: camera pans
          op_args:
            direction: left
        - key: tilt
          tags:
            camera_motion: tilt
            modality_support: video
            image_surface: vertical framing emphasis
            video_surface: camera tilts
          op_args:
            direction: up
        - key: dolly
          tags:
            camera_motion: dolly
            modality_support: video
            image_surface: depth shift framing
            video_surface: camera dollies
          op_args:
            direction: forward
        - key: truck
          tags:
            camera_motion: truck
            modality_support: video
            image_surface: lateral depth framing
            video_surface: camera trucks
          op_args:
            direction: left
        - key: orbit
          tags:
            camera_motion: orbit
            modality_support: video
            image_surface: circular composition emphasis
            video_surface: camera orbits
          op_args:
            direction: around
