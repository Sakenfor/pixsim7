  # ═══════════════════════════════════════════════════════════════════
  # Police Precinct Break Room — uniform rework, coworker proximity,
  # man behind glass, restrained sensual tension
  # ═══════════════════════════════════════════════════════════════════
  - slug: police-precinct-break-room
    name: "Police Precinct — Break Room Proximity"
    description: >-
      Image edit: preserves subject pose and dominance in extreme foreground.
      Adapts environment to a modern police precinct break area. Reworks her
      outfit into a sleek, contour-fitted police uniform. A male coworker
      presses close behind her at the coffee machine. Her man waits behind
      a glass partition, separated and absorbed in his phone. Three-layer
      depth with overhead station lighting and glass reflections.
    composition_strategy: sequential
    package_name: image_edit_scenes
    tags: [image_edit, police, precinct, uniform, proximity, glass, three_layer, sensual_tension]
    is_public: true
    character_bindings:
      coworker:
        character_id: ""
        fallback_name: "A male coworker"
        cast:
          label: "Close figure"
          filter_category: "human"
      partner:
        character_id: ""
        fallback_name: "Her man"
        cast:
          label: "Separated figure"
          filter_category: "human"
    template_metadata:
      target_operation: image_to_image
      mode: image_edit
      controls:
        - id: pose_lock
          type: slider
          label: Pose Lock
          min: 0
          max: 10
          step: 1
          defaultValue: 5
          effects:
            - kind: slot_tag_boost
              slotLabel: Pose lock
              enabledAt: 0
              boostTags: { rigidity: minimal }
              avoidTags: { rigidity: [high, maximum] }
            - kind: slot_tag_boost
              slotLabel: Pose lock
              enabledAt: 2
              boostTags: { rigidity: low }
              avoidTags: { rigidity: [high, maximum] }
            - kind: slot_tag_boost
              slotLabel: Pose lock
              enabledAt: 4
              boostTags: { rigidity: medium }
              avoidTags: { rigidity: [minimal, maximum] }
            - kind: slot_tag_boost
              slotLabel: Pose lock
              enabledAt: 6
              boostTags: { rigidity: high }
              avoidTags: { rigidity: [minimal, low] }
            - kind: slot_tag_boost
              slotLabel: Pose lock
              enabledAt: 8
              boostTags: { rigidity: maximum }
              avoidTags: { rigidity: [minimal, low, medium] }

      features:
        - preset: wardrobe_allure_bundle
          target_slot_key: uniform_aesthetic
          target_slot: Uniform aesthetic
          include_variant_select: true
          include_matrix_preset: true
          variant_control_id: uniform_variant
          variant_control_label: Uniform Variant
          variant_default_value: duty
          variant_control_description: "Choose the base police-uniform variant; the Allure control adjusts fit/daring separately."
          matrix_preset_id: police-allure-coverage
          matrix_preset_label: "Police Precinct: Allure Coverage"
          matrix_preset_description: "Coverage of wardrobe modifier blocks by allure level and tightness."


    slots:
      # ── Subject preservation (graduated pose lock + absolute identity/framing)
      - preset: pose_lock_graduated

      - label: Identity lock
        role: subject
        category: identity_lock
        optional: false

      - label: Framing lock
        role: subject
        category: framing_lock
        optional: false

      # ── Wardrobe — su_lt-ry uniform rework (genre from context) ──
      - key: uniform_aesthetic
        label: Uniform aesthetic
        role: style
        category: aesthetic
        tag_constraints:
          aesthetic: police_uniform
        selection_strategy: weighted_tags
        optional: false


      # ── Environment ────────────────────────────────────────────
      - label: Break room scene
        role: environment
        category: scene_build
        tag_constraints:
          location: police_break_room
        selection_strategy: uniform
        optional: false

      # ── Coworker placement — close behind ──────────────────────
      - label: Coworker depth
        role: placement
        category: depth
        tag_constraints:
          depth: close
          placement: behind
          genre: police
        selection_strategy: uniform
        optional: false

      - label: Coworker description
        role: placement
        category: character_desc
        tag_constraints:
          character_type: coworker
          genre: police
        selection_strategy: uniform
        optional: false

      # ── Her man — behind glass ─────────────────────────────────
      - label: Man placement
        role: placement
        category: depth
        tag_constraints:
          depth: far
          placement: behind_glass
        selection_strategy: uniform
        optional: false

      - label: Man description
        role: placement
        category: character_desc
        tag_constraints:
          character_type: separated_partner
        selection_strategy: uniform
        optional: false

      # ── Camera ─────────────────────────────────────────────────
      - label: Camera angle
        role: camera
        category: angle
        tag_constraints:
          camera_angle: three_quarter_low
        selection_strategy: uniform
        optional: false

      # ── Lighting ───────────────────────────────────────────────
      - label: Key light
        role: lighting
        category: key
        tag_constraints:
          key_light: station_overhead
        selection_strategy: uniform
        optional: false

      - label: Fill light
        role: lighting
        category: fill
        tag_constraints:
          fill_light: glass_reflection
        selection_strategy: uniform
        optional: true
        fallback_text: "Allow the background beyond the glass to fall slightly softer than the foreground."

      # ── Mood ───────────────────────────────────────────────────
      - label: Mood
        role: style
        category: atmosphere
        tag_constraints:
          atmosphere: restrained_sensual
        selection_strategy: uniform
        optional: false

      # ── Composition ────────────────────────────────────────────
      - preset: three_layer_composition

  # ═══════════════════════════════════════════════════════════════════
  # Afternoon Metro — playful trio proximity, tight group framing
  # ═══════════════════════════════════════════════════════════════════
  - slug: afternoon-metro-elderly-trio
    name: "Afternoon Metro - Playful Trio Proximity"
    description: >-
      Image edit: preserves subject pose, clothing, and identity. Places her
      standing in an afternoon metro car with three elderly men in tight group
      proximity. Playful engagement dynamics, metro sway contact, warm window
      sunlight. Tight intimate group framing with narrow field of view.
    composition_strategy: sequential
    package_name: image_edit_scenes
    tags: [image_edit, metro, afternoon, transit, close_framing, trio, elderly, playful, proximity]
    is_public: true
    character_bindings:
      elderly_man_1:
        character_id: ""
        fallback_name: "An elderly man"
        cast:
          label: "Nearest man"
          filter_category: "human"
      elderly_man_2:
        character_id: ""
        fallback_name: "A second elderly man"
        cast:
          label: "Second man"
          filter_category: "human"
      elderly_man_3:
        character_id: ""
        fallback_name: "A third elderly man"
        cast:
          label: "Third man"
          filter_category: "human"
    template_metadata:
      target_operation: image_to_image
      mode: image_edit
      controls:
        - id: pose_lock
          type: slider
          label: Pose Lock
          min: 0
          max: 10
          step: 1
          defaultValue: 5
          effects:
            - kind: slot_tag_boost
              slotLabel: Pose lock
              enabledAt: 0
              boostTags: { rigidity: minimal }
              avoidTags: { rigidity: [high, maximum] }
            - kind: slot_tag_boost
              slotLabel: Pose lock
              enabledAt: 2
              boostTags: { rigidity: low }
              avoidTags: { rigidity: [high, maximum] }
            - kind: slot_tag_boost
              slotLabel: Pose lock
              enabledAt: 4
              boostTags: { rigidity: medium }
              avoidTags: { rigidity: [minimal, maximum] }
            - kind: slot_tag_boost
              slotLabel: Pose lock
              enabledAt: 6
              boostTags: { rigidity: high }
              avoidTags: { rigidity: [minimal, low] }
            - kind: slot_tag_boost
              slotLabel: Pose lock
              enabledAt: 8
              boostTags: { rigidity: maximum }
              avoidTags: { rigidity: [minimal, low, medium] }

        - id: proximity
          type: slider
          label: Proximity
          min: 0
          max: 10
          step: 1
          defaultValue: 7
          effects:
            # ── Nearest man placement ──
            - kind: slot_tag_boost
              slotLabel: Nearest man placement
              enabledAt: 0
              boostTags: { proximity: relaxed }
              avoidTags: { proximity: intimate }
            - kind: slot_tag_boost
              slotLabel: Nearest man placement
              enabledAt: 4
              boostTags: { proximity: close }
              avoidTags: { proximity: relaxed }
            - kind: slot_tag_boost
              slotLabel: Nearest man placement
              enabledAt: 7
              boostTags: { proximity: intimate }
              avoidTags: { proximity: relaxed }
            # ── Second man placement ──
            - kind: slot_tag_boost
              slotLabel: Second man placement
              enabledAt: 0
              boostTags: { proximity: relaxed }
              avoidTags: { proximity: intimate }
            - kind: slot_tag_boost
              slotLabel: Second man placement
              enabledAt: 4
              boostTags: { proximity: close }
              avoidTags: { proximity: relaxed }
            - kind: slot_tag_boost
              slotLabel: Second man placement
              enabledAt: 7
              boostTags: { proximity: intimate }
              avoidTags: { proximity: relaxed }
            # ── Third man placement ──
            - kind: slot_tag_boost
              slotLabel: Third man placement
              enabledAt: 0
              boostTags: { proximity: relaxed }
              avoidTags: { proximity: intimate }
            - kind: slot_tag_boost
              slotLabel: Third man placement
              enabledAt: 4
              boostTags: { proximity: close }
              avoidTags: { proximity: relaxed }
            - kind: slot_tag_boost
              slotLabel: Third man placement
              enabledAt: 7
              boostTags: { proximity: intimate }
              avoidTags: { proximity: relaxed }

        - id: men_count
          type: slider
          label: "Men"
          min: 1
          max: 3
          step: 1
          defaultValue: 3
          effects:
            # At 1: push 2nd + 3rd men toward background
            - kind: slot_tag_boost
              slotLabel: Second man placement
              enabledAt: 1
              boostTags: { prominence: background }
              avoidTags: { prominence: featured }
            - kind: slot_tag_boost
              slotLabel: Second man description
              enabledAt: 1
              boostTags: { prominence: background }
              avoidTags: { prominence: featured }
            - kind: slot_tag_boost
              slotLabel: Third man placement
              enabledAt: 1
              boostTags: { prominence: background }
              avoidTags: { prominence: featured }
            - kind: slot_tag_boost
              slotLabel: Third man description
              enabledAt: 1
              boostTags: { prominence: background }
              avoidTags: { prominence: featured }
            # At 2: 2nd man becomes featured, 3rd stays background
            - kind: slot_tag_boost
              slotLabel: Second man placement
              enabledAt: 2
              boostTags: { prominence: featured }
            - kind: slot_tag_boost
              slotLabel: Second man description
              enabledAt: 2
              boostTags: { prominence: featured }
            # At 3: 3rd man also featured
            - kind: slot_tag_boost
              slotLabel: Third man placement
              enabledAt: 3
              boostTags: { prominence: featured }
            - kind: slot_tag_boost
              slotLabel: Third man description
              enabledAt: 3
              boostTags: { prominence: featured }

        - id: engagement
          type: slider
          label: Engagement
          min: 0
          max: 10
          step: 1
          defaultValue: 5
          effects:
            - kind: slot_tag_boost
              slotLabel: Woman engagement beat
              enabledAt: 0
              boostTags: { boldness: subtle }
              avoidTags: { boldness: bold }
            - kind: slot_tag_boost
              slotLabel: Woman engagement beat
              enabledAt: 4
              boostTags: { boldness: moderate }
              avoidTags: { boldness: subtle }
            - kind: slot_tag_boost
              slotLabel: Woman engagement beat
              enabledAt: 7
              boostTags: { boldness: bold }
              avoidTags: { boldness: subtle }

