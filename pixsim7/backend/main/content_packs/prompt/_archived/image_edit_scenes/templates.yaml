  # ---------------------------------------------------------------------------
  - slug: pov-approach-response-progression
    name: "POV Approach Response Progression (Generic)"
    description: >-
      Image edit progression template for a single woman already present in the source image.
      Preserves identity/framing/clothing and stages modular POV/OTS/observer interaction beats
      (proximity, contact, response, expression) for sequential generation chains.
    composition_strategy: sequential
    package_name: image_edit_scenes
    tags: [image_edit, sequential_ready, pov, interaction, progression, generic_scene]
    is_public: true
    character_bindings:
      subject:
        character_id: ""
        fallback_name: "the woman"
        cast:
          label: "Source subject"
          filter_category: "human"
      pov_actor:
        character_id: ""
        fallback_name: "An adult person"
        cast:
          label: "POV / approaching person"
          filter_category: "human"
    template_metadata:
      target_operation: image_to_image
      mode: image_edit
      controls:
        - id: pose_lock
          type: slider
          label: Pose Lock
          min: 0
          max: 10
          step: 1
          defaultValue: 5
          effects:
            - kind: slot_tag_boost
              slotLabel: Pose lock
              enabledAt: 0
              boostTags: { rigidity: minimal }
              avoidTags: { rigidity: [high, maximum] }
            - kind: slot_tag_boost
              slotLabel: Pose lock
              enabledAt: 2
              boostTags: { rigidity: low }
              avoidTags: { rigidity: [high, maximum] }
            - kind: slot_tag_boost
              slotLabel: Pose lock
              enabledAt: 4
              boostTags: { rigidity: medium }
              avoidTags: { rigidity: [minimal, maximum] }
            - kind: slot_tag_boost
              slotLabel: Pose lock
              enabledAt: 6
              boostTags: { rigidity: high }
              avoidTags: { rigidity: [minimal, low] }
            - kind: slot_tag_boost
              slotLabel: Pose lock
              enabledAt: 8
              boostTags: { rigidity: maximum }
              avoidTags: { rigidity: [minimal, low, medium] }
        - id: hand_anchor
          type: slider
          label: Hand Anchor
          min: 0
          max: 10
          step: 1
          defaultValue: 3
          effects:
            # Default: don't invent hands; preserve if present in source.
            - kind: slot_tag_boost
              slotLabel: Camera POV framing
              enabledAt: 0
              boostTags: { hand_anchor: allow }
            - kind: slot_tag_boost
              slotLabel: POV presence cue
              enabledAt: 0
              boostTags: { hand_anchor: allow }
            # High: explicitly require hands visible in-frame.
            - kind: slot_tag_boost
              slotLabel: Camera POV framing
              enabledAt: 7
              boostTags: { hand_anchor: require }
              avoidTags: { hand_anchor: [allow] }
            - kind: slot_tag_boost
              slotLabel: POV presence cue
              enabledAt: 7
              boostTags: { hand_anchor: require }
              avoidTags: { hand_anchor: [allow] }
      progression_axes:
        view_profile: [observer, pov_hand, ots]
        proximity_stage: [far, near, arm_reach, close]
        contact_stage: [none, offered_hand, brief_contact]
        response_mode: [receptive, neutral, hesitant, boundary]
        scene_mode: [semantic, plate, hybrid]
      matrix_presets:
        - id: pov-progression-coverage
          label: "POV Progression Coverage"
          description: "Coverage of POV progression blocks by beat axis and response mode."
          query:
            row_key: tag:beat_axis
            col_key: tag:response_mode
            tags: sequence_family:pov_approach_response
            include_empty: true
        - id: pov-view-profile-coverage
          label: "POV View Profiles"
          description: "Coverage of POV progression blocks by beat axis and view profile."
          query:
            row_key: tag:beat_axis
            col_key: tag:view_profile
            tags: sequence_family:pov_approach_response
            include_empty: true

    slots:
      # Subject preservation (graduated pose lock + identity/framing/clothing)
      - preset: pose_lock_graduated

      - label: Identity lock
        role: subject
        category: identity_lock
        optional: false

      - label: Framing lock
        role: subject
        category: framing_lock
        optional: false

      - label: Clothing lock
        role: subject
        category: clothing_lock
        selection_strategy: uniform
        optional: false

      # Optional semantic fallback layer when no explicit background/scene plate is provided
      - label: Scene semantics
        role: environment
        category: scene_build
        tag_constraints:
          scene_scope: generic_real_world
          edit_mode: image_edit
        selection_strategy: uniform
        optional: true
        fallback_text: "Preserve the original setting and spatial continuity of the source image."

      # Camera / POV framing axis (chain or controller can override tag constraints per step)
      - label: Camera POV framing
        role: camera
        category: composition
        tag_constraints:
          sequence_family: pov_approach_response
          beat_axis: view
          view_profile: pov_hand
        selection_strategy: weighted_tags
        optional: false

      # Optional implied presence cue (hand/arm in frame, over-shoulder cue, off-camera nearness)
      - label: POV presence cue
        role: composition
        category: framing
        tag_constraints:
          sequence_family: pov_approach_response
          beat_axis: presence
          view_profile: pov_hand
        selection_strategy: weighted_tags
        optional: false
        fallback_text: "If the source image already includes {{pov_actor}}'s hand or forearm at the frame edge, preserve it to establish POV. Do not invent extra hands."

      # Anchor subject continuity as beats progress across sequential img2img steps
      - label: Subject placement continuity
        role: placement
        category: depth
        tag_constraints:
          sequence_family: pov_approach_response
          beat_axis: continuity
        selection_strategy: uniform
        optional: false

      # Progression beats (typically change one axis at a time between sequential steps)
      - label: Proximity beat
        role: placement
        category: depth
        tag_constraints:
          sequence_family: pov_approach_response
          beat_axis: proximity
          proximity_stage: near
        selection_strategy: uniform
        optional: false

      - label: Contact beat
        role: action
        category: interaction_beat
        tag_constraints:
          sequence_family: pov_approach_response
          beat_axis: contact
          contact_stage: none
        selection_strategy: uniform
        optional: true
        fallback_text: "Maintain clear personal space with no direct contact."

      - label: Subject response beat
        role: action
        category: interaction_beat
        tag_constraints:
          sequence_family: pov_approach_response
          beat_axis: response
          response_mode: neutral
        selection_strategy: uniform
        optional: false

      - label: Expression beat
        role: subject
        category: expression_behavior
        tag_constraints:
          sequence_family: pov_approach_response
          beat_axis: expression
          response_mode: neutral
        selection_strategy: uniform
        optional: false

      # Anti-drift reinforcement for multi-step img2img chains
      - label: Continuity refine
        role: composition
        category: motion_beat
        tag_constraints:
          sequence_family: pov_approach_response
          beat_axis: refine
        selection_strategy: uniform
        optional: true
        fallback_text: "Keep identity, framing, and scene continuity stable across progression steps."

      - label: Atmosphere tone
        role: style
        category: atmosphere
        tag_constraints:
          sequence_family: pov_approach_response
          beat_axis: tone
        selection_strategy: uniform
        optional: true

