    package_name: image_edit_scenes
    tags: [image_edit, victorian, detective, study, intimate, proximity, period]
    is_public: true
    character_bindings:
      detective:
        character_id: ""
        fallback_name: "An older detective"
        cast:
          label: "Authority figure"
          filter_category: "human"
    template_metadata:
      target_operation: image_to_image
      mode: image_edit
      controls:
        - id: pose_lock
          type: slider
          label: Pose Lock
          min: 0
          max: 10
          step: 1
          defaultValue: 5
          effects:
            - kind: slot_tag_boost
              slotLabel: Pose lock
              enabledAt: 0
              boostTags: { rigidity: minimal }
              avoidTags: { rigidity: [high, maximum] }
            - kind: slot_tag_boost
              slotLabel: Pose lock
              enabledAt: 2
              boostTags: { rigidity: low }
              avoidTags: { rigidity: [high, maximum] }
            - kind: slot_tag_boost
              slotLabel: Pose lock
              enabledAt: 4
              boostTags: { rigidity: medium }
              avoidTags: { rigidity: [minimal, maximum] }
            - kind: slot_tag_boost
              slotLabel: Pose lock
              enabledAt: 6
              boostTags: { rigidity: high }
              avoidTags: { rigidity: [minimal, low] }
            - kind: slot_tag_boost
