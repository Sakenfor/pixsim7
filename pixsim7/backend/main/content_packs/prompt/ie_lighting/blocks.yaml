version: "1.0.0"
package_name: ie_lighting

defaults:
  source_type: library
  curation_status: curated
  is_public: true
  style: photorealistic
  created_by: content_pack
  default_intent: modify

blocks:

  # ═══════════════════════════════════════════════════════════════════
  # KEY LIGHTS
  # ═══════════════════════════════════════════════════════════════════

  - block_id: ie_key_oil_lamp
    role: lighting
    category: key
    kind: single_state
    text: >-
      A single oil-lamp provides the primary light source.
      Strong directional warm light from the side and slightly above.
      Creates defined highlight bands along surfaces and contours.
      Deep shadow planes fall across the opposite side while retaining
      visible surface texture.
    tags:
      intent: modify
      key_light: oil_lamp
      warmth: warm
      direction: side_above
      contrast: high
    complexity_level: moderate

  - block_id: ie_key_gas_lamp_01
    role: lighting
    category: key
    kind: single_state
    text: >-
      Warm gas-lamp light pools softly across nearby surfaces and figures,
      creating a cozy enclosed atmosphere. Avoid sharp outlines or dramatic
      edge highlights. Illumination should feel close and atmospheric,
      falling off into deep amber shadow at the room edges.
    tags:
      intent: modify
      key_light: gas_lamp
      warmth: warm
      direction: desk_level
      contrast: low
    complexity_level: moderate

  - block_id: ie_key_gas_lamp_02
    role: lighting
    category: key
    kind: single_state
    text: >-
      Two gas-lamp sconces on the wall behind cast overlapping pools
      of amber light. The illumination wraps around figures from behind
      and above, creating warm rim-light on hair and shoulders while
      nearby surfaces glow from reflected light below.
    tags:
      intent: modify
      key_light: gas_lamp
      warmth: warm
      direction: behind_above
      contrast: medium
    complexity_level: moderate

  - block_id: ie_key_gas_lamp_03
    role: lighting
    category: key
    kind: single_state
    text: >-
      A single desk lamp with a green glass shade provides the only
      light source, casting a concentrated warm pool across the
      immediate work surface. Everything beyond arm's reach dissolves
      into soft darkness. Faces are lit from below and to the side.
    tags:
      intent: modify
      key_light: gas_lamp
      warmth: warm
      direction: desk_below
      contrast: high
    complexity_level: moderate

  # ═══════════════════════════════════════════════════════════════════
  # FILL LIGHTS
  # ═══════════════════════════════════════════════════════════════════

  - block_id: ie_fill_fireplace_glow
    role: lighting
    category: fill
    kind: single_state
    text: >-
      Low fireplace glow from across the room provides a faint secondary
      fill, adding warmth to the shadow side without competing with the
      primary light. Embers pulse slightly, casting barely perceptible
      movement into the stillness.
    tags:
      intent: modify
      fill_light: fireplace
      warmth: warm
      purpose: shadow_softening
    complexity_level: simple

  - block_id: ie_fill_glass_reflection_01
    role: lighting
    category: fill
    kind: single_state
    text: >-
      A glass partition bounces faint secondary fill back into the
      foreground space, softening shadow edges on rear-facing surfaces.
      The reflection carries a cooler tone than the primary key light,
      adding dimensional separation. Silhouettes ghost faintly on the
      glass surface, layering foreground and background visually.
    tags:
      intent: modify
      fill_light: glass_reflection
      warmth: cool
      purpose: separation
    complexity_level: moderate
