version: "1.0.0"

templates:
  - slug: dane-mount-rear-approach
    name: "Great Dane — Rear Approach & Mount"
    description: >-
      Full Great Dane scene: camera drifts behind, dane enters and approaches,
      mounts from rear, detail shot, her reaction, closeup. Reinforcement slots
      maintain anatomy consistency, audio cues provide reactive vocalizations.
      Requires character bindings for 'actor' (canine_large) and 'human'.
    composition_strategy: sequential
    package_name: dane_encounter
    tags: [dane, mount, encounter, rear, intimate, canine_large, reinforcement, audio_cue]
    is_public: true
    character_bindings:
      actor:
        character_id: "great_dane_01"
        cast:
          label: "Animal"
          filter_species: "canine_large"
      her:
        character_id: "her_01"
        cast:
          label: "Subject"
          filter_category: "human"
    template_metadata:
      target_duration_sec: 8
      max_chars: 2048
      provider: pixverse
      mode: image_to_video
      target_operation: image_to_video
      notes: "Bind 'actor' to canine_large character, 'her' to human character"
      controls:
        - id: pose_lock
          type: slider
          label: Pose Lock
          min: 0
          max: 10
          step: 1
          defaultValue: 5
          effects:
            - kind: slot_tag_boost
              slotLabel: Pose lock
              enabledAt: 0
              boostTags: { rigidity: low }
              avoidTags: { rigidity: [high, maximum] }
            - kind: slot_tag_boost
              slotLabel: Pose lock
              enabledAt: 3
              boostTags: { rigidity: medium }
              avoidTags: { rigidity: low }
            - kind: slot_tag_boost
              slotLabel: Pose lock
              enabledAt: 6
              boostTags: { rigidity: [high, maximum] }
              avoidTags: { rigidity: [low, medium] }
            - kind: slot_tag_boost
              slotLabel: Pose lock
              enabledAt: 9
              boostTags: { rigidity: maximum }
              avoidTags: { rigidity: [low, medium] }

    slots:
      # ── Opening
      - label: Camera Drift Behind
        role: camera
        category: drift
        tag_constraints:
          camera: drift_behind
        selection_strategy: uniform
        optional: false

      # ── Pose lock (graduated via slider control)
      - label: Pose lock
        role: subject
        category: pose_lock
        selection_strategy: weighted_tags
        tag_constraints:
          lock: pose
          mode: [i2v, any]
        preferences:
          boost_tags:
            rigidity: medium
        optional: false

      # ── Dane enters on hindlegs from behind
      - label: Dane Entrance
        role: action
        category: entrance
        tag_constraints:
          species: canine_large
          element: dane
        selection_strategy: uniform
        optional: false

      # ── Lock in anatomy before contact
      - label: Physical reminder
        kind: reinforcement
        reinforcement_text: "({{actor}}: {{actor.chest}}, {{actor.haunches}}, {{actor.shoulders}}, {{actor.stance}}. Both figures distinct and separately rendered.)"

      # ── Approach / investigation
      - label: Approach
        role: action
        category: approach
        tag_constraints:
          species: canine_large
        selection_strategy: uniform
        optional: false

      # ── Dane vocalizes during approach
      - label: Approach cue
        kind: audio_cue
        reinforcement_text: "{{actor}} {{actor.vocal_pleasure}}, {{actor.breath}}, {{actor.tail_motion}}"
        inherit_intensity: true

      # ── Mount
      - label: Mount Action
        role: action
        category: mount
        tag_constraints:
          motion: mount
          element: dane
        selection_strategy: uniform
        optional: false

      # ── Dane effort during mount
      - label: Mount cue
        kind: audio_cue
        reinforcement_text: "({{actor}} {{actor.vocal_effort}}, {{actor.breath}}, {{actor.weight_shift}}; {{actor.press}}, {{actor.muscle}})"
        inherit_intensity: true

      # ── Her reaction audio
      - label: Her audio cue
        kind: audio_cue
        reinforcement_text: "she whispers \"{{her.utterance}}\", {{her.vocal_pleasure}}, {{her.breath}}"
        inherit_intensity: true

      # ── Her physical reaction
      - label: Her Reaction
        role: character
        category: reaction
        tag_constraints:
          element: dane
        selection_strategy: uniform
        optional: false

      # ── Terminal camera lock (generic block)
      - label: Camera lock
        role: camera
        category: camera_lock
        tag_constraints:
          camera: observer_lock
        selection_strategy: uniform
        optional: false
