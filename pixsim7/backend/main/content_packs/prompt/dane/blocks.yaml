      scene_type: encounter
      motion: pull
      intensity: 7
      species: canine_large
    complexity_level: complex
    description: "Main action v4 — foreleg hooks hip, pulls her in, neck breathing"

  - block_id: dane_main_05
    role: action
    category: main_action
    kind: single_state
    text: >-
      The Dane pins her against the surface behind her, its mass
