      tone: dominant
      scene_type: encounter
      motion: wedge
      intensity: 5
      species: canine_large
    complexity_level: moderate
    description: "Approach v4 — muzzle under arm, wedging into her space"

  - block_id: dane_approach_05
    role: action
    category: approach
    kind: single_state
    text: >-
      It lowers its head and presses its forehead against her stomach,
      the pressure steady and insistent, shoulders bunched, hindquarters
      still, the full weight of its skull and neck concentrated in a
      single point of contact that pushes her half a step backward
    tags:
      tone: dominant
      scene_type: encounter
      motion: press
      intensity: 6
      species: canine_large
    complexity_level: moderate
    description: "Approach v5 — forehead press against stomach, immovable force"

  - block_id: dane_approach_06
    role: action
    category: approach
    kind: single_state
    text: >-
      The Dane's long tongue drags across the back of her hand as it
      moves past, leaving a wet trail, it turns and comes back the
      other way, shoulder brushing her leg, its body heat radiating
      through the thin gap between them
    tags:
      tone: dominant
      scene_type: encounter
      motion: pass
      intensity: 5
      species: canine_large
    complexity_level: simple
    description: "Approach v6 — lick in passing, circling body heat"

  # === Main action (intensity 6-8) ===

  - block_id: dane_main_01
