      Her breath catches as the weight settles against her, eyes
      widening for a moment before she steadies, one hand rising
      instinctively to rest on the Dane's broad skull, fingers
      curling into the short fur behind its ear
    tags:
      tone: dominant
      scene_type: encounter
      motion: reaction
      intensity: 5
      species: canine_large
    complexity_level: moderate
