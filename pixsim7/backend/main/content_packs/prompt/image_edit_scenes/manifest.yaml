id: image_edit_scenes
title: "Image Edit Scenes"
description: "Block Matrix presets for the image_edit_scenes pack — shared style, camera, placement, environment, and settings blocks, plus a full-pack overview spanning all scene sub-packs."

matrix_presets:
  - label: "Full pack overview (role × category)"
    query:
      row_key: "role"
      col_key: "category"
      package_name: "image_edit_scenes"
      include_empty: true
      include_drift_report: true
      expected_tag_keys: "intent"
      required_tag_keys: "intent"

  - label: "Style aesthetics (aesthetic × variant)"
    query:
      row_key: "tag:aesthetic"
      col_key: "tag:variant"
      role: "style"
      category: "aesthetic"
      package_name: "image_edit_scenes"
      include_empty: true
      include_drift_report: true
      expected_tag_keys: "intent,aesthetic,genre,variant,palette"
      required_tag_keys: "aesthetic"

  - label: "Backgrounds (location × setting_style)"
    query:
      row_key: "tag:location"
      col_key: "tag:setting_style"
      role: "environment"
      category: "scene_build"
      package_name: "image_edit_scenes"
      include_empty: true
      include_drift_report: true
      expected_tag_keys: "intent,layer,location,setting_style"
      required_tag_keys: "location"
