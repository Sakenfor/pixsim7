version: "1.0.0"

templates:
  # ═══════════════════════════════════════════════════════════════════
  # Hotel Lobby — three-layer depth with two placed characters
  # ═══════════════════════════════════════════════════════════════════
  - slug: hotel-lobby-behind-subject
    name: "Hotel Lobby — Porter Close, Man Far"
    description: >-
      Image edit: preserves subject in foreground, builds a hotel lobby behind,
      places a porter close behind and a distracted man in the far background.
      Three-layer depth with bright natural indoor lighting.
    composition_strategy: sequential
    package_name: image_edit_scenes
    tags: [image_edit, hotel, lobby, three_layer, depth, preserve_subject]
    is_public: true
    character_bindings:
      placed_character:
        character_id: ""
        fallback_name: "A man"
        cast:
          label: "Background figure"
          filter_category: "human"
    template_metadata:
      target_operation: image_to_image
      mode: image_edit

    slots:
      # ── Subject preservation ────────────────────────────────────
      - preset: subject_preservation

      # ── Environment ─────────────────────────────────────────────
      - label: Background scene
        role: environment
        category: scene_build
        tag_constraints:
          location: hotel_lobby
        selection_strategy: uniform
        optional: false

      # ── Placement — porter close behind ─────────────────────────
      - label: Porter placement
        role: placement
        category: depth
        tag_constraints:
          depth: close
          placement: behind
        selection_strategy: uniform
        optional: false

      - label: Porter description
        role: placement
        category: character_desc
        tag_constraints:
          character_type: porter
        selection_strategy: uniform
        optional: false

      # ── Placement — man far background ──────────────────────────
      - label: Man placement
        role: placement
        category: depth
        tag_constraints:
          depth: far
        selection_strategy: uniform
        optional: false

      - label: Man description
        role: placement
        category: character_desc
        tag_constraints:
          character_type: bystander
        selection_strategy: uniform
        optional: false

      # ── Lighting ────────────────────────────────────────────────
      - label: Key light
        role: lighting
        category: key
        tag_constraints:
          key_light: ceiling
        selection_strategy: uniform
        optional: false

      - label: Fill light
        role: lighting
        category: fill
        tag_constraints:
          fill_light: warm_bounce
        selection_strategy: uniform
        optional: true
        fallback_text: "Allow the background to be slightly softer than the foreground."

      # ── Composition ─────────────────────────────────────────────
      - preset: three_layer_composition

  # ═══════════════════════════════════════════════════════════════════
  # Undercity Thief — medieval wardrobe rework, game-stylized rendering
  # ═══════════════════════════════════════════════════════════════════
  - slug: undercity-thief-corridor
    name: "Undercity Thief — Medieval Rework, Low Angle"
    description: >-
      Image edit: preserves subject pose, reworks clothing to medieval thief
      aesthetic, places in undercity corridor with oil-lamp lighting,
      game-stylized rendering, partial male presence at midground.
    composition_strategy: sequential
    package_name: image_edit_scenes
    tags: [image_edit, medieval, thief, undercity, game_stylized, low_angle]
    is_public: true
    character_bindings: {}
    template_metadata:
      target_operation: image_to_image
      mode: image_edit

    slots:
      # ── Subject preservation ────────────────────────────────────
      - label: Pose lock
        role: subject
        category: pose_lock
        selection_strategy: uniform
        optional: false

      - label: Identity lock
        role: subject
        category: identity_lock
        selection_strategy: uniform
        optional: false

      # ── Style — wardrobe rework ─────────────────────────────────
      - label: Wardrobe style
        role: style
        category: wardrobe
        tag_constraints:
          aesthetic: medieval_thief
        selection_strategy: uniform
        optional: false

      # ── Camera ──────────────────────────────────────────────────
      - label: Camera angle
        role: camera
        category: angle
        tag_constraints:
          camera_angle: low
        selection_strategy: uniform
        optional: false

      - label: Field of view
        role: camera
        category: fov
        tag_constraints:
          fov: narrow
        selection_strategy: uniform
        optional: false

      # ── Environment ─────────────────────────────────────────────
      - label: Background scene
        role: environment
        category: scene_build
        tag_constraints:
          location: undercity_corridor
        selection_strategy: uniform
        optional: false

      # ── Lighting ────────────────────────────────────────────────
      - label: Key light
        role: lighting
        category: key
        tag_constraints:
          key_light: oil_lamp
        selection_strategy: uniform
        optional: false

      - label: Fill light
        role: lighting
        category: fill
        tag_constraints:
          fill_light: cool_slit
        selection_strategy: uniform
        optional: false

      # ── Placement — partial male presence ───────────────────────
      - label: Male presence
        role: placement
        category: depth
        tag_constraints:
          visibility: partial
        selection_strategy: uniform
        optional: true
        fallback_text: ""

      - label: Presence description
        role: placement
        category: character_desc
        tag_constraints:
          character_type: male_presence
        selection_strategy: uniform
        optional: true
        fallback_text: ""

      # ── Style — rendering & tone ────────────────────────────────
      - label: Rendering style
        role: style
        category: rendering
        tag_constraints:
          rendering: game_stylized
        selection_strategy: uniform
        optional: false

      - label: Atmosphere
        role: style
        category: atmosphere
        tag_constraints:
          atmosphere: predator
        selection_strategy: uniform
        optional: false

      # ── Composition ─────────────────────────────────────────────
      - label: Layer order
        role: composition
        category: layer_order
        tag_constraints:
          depth_layers: 3
        selection_strategy: uniform
        optional: false

  # ═══════════════════════════════════════════════════════════════════
  # Generic scene swap — minimal, two-layer
  # ═══════════════════════════════════════════════════════════════════
  - slug: scene-swap-two-layer
    name: "Scene Swap — Preserve Subject, New Background"
    description: >-
      Generic image edit: preserves subject in foreground, replaces background.
      Two-layer depth. Picks random background and lighting.
    composition_strategy: sequential
    package_name: image_edit_scenes
    tags: [image_edit, scene_swap, two_layer, preserve_subject]
    is_public: true
    character_bindings: {}
    template_metadata:
      target_operation: image_to_image
      mode: image_edit

    slots:
      - preset: subject_preservation

      - label: Background scene
        role: environment
        category: scene_build
        selection_strategy: uniform
        optional: false

      - label: Key light
        role: lighting
        category: key
        selection_strategy: uniform
        optional: false

      - preset: two_layer_composition

  # ═══════════════════════════════════════════════════════════════════
  # Victorian Detective Study — intimate proximity, paper disruption
  # ═══════════════════════════════════════════════════════════════════
  - slug: victorian-detective-study
    name: "Victorian Detective Study — Intimate Disruption"
    description: >-
      Image edit: preserves subject pose, places her in a Victorian
      detective's study at a cluttered desk. An older detective stands
      extremely close behind, reaching past her. She idly sifts through
      his papers. Gas-lamp lighting, over-shoulder camera, intimate
      disruption mood.
    composition_strategy: sequential
    package_name: image_edit_scenes
    tags: [image_edit, victorian, detective, study, intimate, proximity, period]
    is_public: true
    character_bindings: {}
    template_metadata:
      target_operation: image_to_image
      mode: image_edit

    slots:
      # ── Subject preservation ────────────────────────────────────
      - preset: subject_preservation

      # ── Wardrobe accent ────────────────────────────────────────
      - label: Wardrobe accent
        role: style
        category: wardrobe
        tag_constraints:
          aesthetic: victorian_accent
        selection_strategy: uniform
        optional: true
        fallback_text: "Keep her clothing exactly as it appears in the source image."

      # ── Environment ────────────────────────────────────────────
      - label: Victorian study
        role: environment
        category: scene_build
        tag_constraints:
          location: victorian_study
        selection_strategy: uniform
        optional: false

      # ── Activity ───────────────────────────────────────────────
      - label: Desk activity
        role: action
        category: desk_activity
        tag_constraints:
          genre: detective
        selection_strategy: uniform
        optional: false

      # ── Detective placement ────────────────────────────────────
      - label: Detective depth
        role: placement
        category: depth
        tag_constraints:
          depth: close
          placement: behind
        selection_strategy: uniform
        optional: false

      - label: Detective description
        role: placement
        category: character_desc
        tag_constraints:
          character_type: detective
        selection_strategy: uniform
        optional: false

      # ── Camera ─────────────────────────────────────────────────
      - label: Camera angle
        role: camera
        category: angle
        tag_constraints:
          camera_angle: over_shoulder
        selection_strategy: uniform
        optional: false

      # ── Lighting ───────────────────────────────────────────────
      - label: Key light
        role: lighting
        category: key
        tag_constraints:
          key_light: gas_lamp
        selection_strategy: uniform
        optional: false

      - label: Fill light
        role: lighting
        category: fill
        tag_constraints:
          fill_light: fireplace
        selection_strategy: uniform
        optional: true
        fallback_text: "Shadows fall to deep amber at the room edges."

      # ── Mood ───────────────────────────────────────────────────
      - label: Mood
        role: style
        category: atmosphere
        tag_constraints:
          atmosphere: intimate_disruption
        selection_strategy: uniform
        optional: false

      # ── Composition ────────────────────────────────────────────
      - preset: three_layer_composition

  # ═══════════════════════════════════════════════════════════════════
  # Police Precinct Break Room — uniform rework, coworker proximity,
  # man behind glass, restrained sensual tension
  # ═══════════════════════════════════════════════════════════════════
  - slug: police-precinct-break-room
    name: "Police Precinct — Break Room Proximity"
    description: >-
      Image edit: preserves subject pose and dominance in extreme foreground.
      Adapts environment to a modern police precinct break area. Reworks her
      outfit into a sleek, contour-fitted police uniform. A male coworker
      presses close behind her at the coffee machine. Her man waits behind
      a glass partition, separated and absorbed in his phone. Three-layer
      depth with overhead station lighting and glass reflections.
    composition_strategy: sequential
    package_name: image_edit_scenes
    tags: [image_edit, police, precinct, uniform, proximity, glass, three_layer, sensual_tension]
    is_public: true
    character_bindings: {}
    template_metadata:
      target_operation: image_to_image
      mode: image_edit

    slots:
      # ── Subject preservation ────────────────────────────────────
      - preset: subject_preservation

      # ── Wardrobe — su_lt-ry uniform rework (genre from context) ──
      - label: Uniform style
        role: style
        category: wardrobe
        tag_constraints:
          variant: sultry
        selection_strategy: uniform
        optional: false

      # ── Environment ────────────────────────────────────────────
      - label: Break room scene
        role: environment
        category: scene_build
        tag_constraints:
          location: police_break_room
        selection_strategy: uniform
        optional: false

      # ── Coworker placement — close behind ──────────────────────
      - label: Coworker depth
        role: placement
        category: depth
        tag_constraints:
          depth: close
          placement: behind
          genre: police
        selection_strategy: uniform
        optional: false

      - label: Coworker description
        role: placement
        category: character_desc
        tag_constraints:
          character_type: coworker
          genre: police
        selection_strategy: uniform
        optional: false

      # ── Her man — behind glass ─────────────────────────────────
      - label: Man placement
        role: placement
        category: depth
        tag_constraints:
          depth: far
          placement: behind_glass
        selection_strategy: uniform
        optional: false

      - label: Man description
        role: placement
        category: character_desc
        tag_constraints:
          character_type: separated_partner
        selection_strategy: uniform
        optional: false

      # ── Camera ─────────────────────────────────────────────────
      - label: Camera angle
        role: camera
        category: angle
        tag_constraints:
          camera_angle: three_quarter_low
        selection_strategy: uniform
        optional: false

      # ── Lighting ───────────────────────────────────────────────
      - label: Key light
        role: lighting
        category: key
        tag_constraints:
          key_light: station_overhead
        selection_strategy: uniform
        optional: false

      - label: Fill light
        role: lighting
        category: fill
        tag_constraints:
          fill_light: glass_reflection
        selection_strategy: uniform
        optional: true
        fallback_text: "Allow the background beyond the glass to fall slightly softer than the foreground."

      # ── Mood ───────────────────────────────────────────────────
      - label: Mood
        role: style
        category: atmosphere
        tag_constraints:
          atmosphere: restrained_sensual
        selection_strategy: uniform
        optional: false

      # ── Composition ────────────────────────────────────────────
      - preset: three_layer_composition
