  # Night Train Conductor — clothing preserved, confined aisle proximity
  # ═══════════════════════════════════════════════════════════════════
  - slug: night-train-conductor
    name: "Night Train — Conductor Proximity"
    description: >-
      Image edit: preserves subject pose and clothing exactly as-is.
      Places her in an older luxury night train carriage. A slightly
      shabby conductor lingers in the confined aisle behind her,
      proximity amplified by motion and narrow space. Dim yellow wall
      lamps, darkness outside with faint reflections. Three-layer depth.
    composition_strategy: sequential
    package_name: image_edit_scenes
    tags: [image_edit, night_train, conductor, preserve_subject, preserve_clothing, three_layer, confined, nocturnal]
    is_public: true
    character_bindings:
      conductor:
        character_id: ""
        fallback_name: "A conductor"
        cast:
          label: "Authority figure"
          filter_category: "human"
    template_metadata:
      target_operation: image_to_image
      mode: image_edit
      controls:
        - id: pose_lock
          type: slider
          label: Pose Lock
          min: 0
          max: 10
          step: 1
          defaultValue: 5
          effects:
            - kind: slot_tag_boost
              slotLabel: Pose lock
              enabledAt: 0
              boostTags: { rigidity: minimal }
              avoidTags: { rigidity: [high, maximum] }
            - kind: slot_tag_boost
              slotLabel: Pose lock
              enabledAt: 2
              boostTags: { rigidity: low }
              avoidTags: { rigidity: [high, maximum] }
            - kind: slot_tag_boost
              slotLabel: Pose lock
              enabledAt: 4
              boostTags: { rigidity: medium }
              avoidTags: { rigidity: [minimal, maximum] }
            - kind: slot_tag_boost
              slotLabel: Pose lock
              enabledAt: 6
              boostTags: { rigidity: high }
              avoidTags: { rigidity: [minimal, low] }
            - kind: slot_tag_boost
              slotLabel: Pose lock
              enabledAt: 8
              boostTags: { rigidity: maximum }
              avoidTags: { rigidity: [minimal, low, medium] }

    slots:
      # ── Subject preservation (graduated pose lock + absolute identity/framing)
      - preset: pose_lock_graduated

      - label: Identity lock
        role: subject
        category: identity_lock
        optional: false

      - label: Framing lock
        role: subject
        category: framing_lock
        optional: false

      # ── Clothing lock — no changes ──────────────────────────────
      - label: Clothing lock
        role: subject
        category: clothing_lock
        selection_strategy: uniform
        optional: false

      # ── Environment ─────────────────────────────────────────────
      - label: Night train interior
        role: environment
        category: scene_build
        tag_constraints:
          location: night_train
        selection_strategy: uniform
        optional: false

      # ── Conductor placement — close in aisle ────────────────────
      - label: Conductor depth
        role: placement
        category: depth
        tag_constraints:
          depth: close
          setting: train
        selection_strategy: uniform
        optional: false

      - label: Conductor description
        role: placement
        category: character_desc
        tag_constraints:
          character_type: conductor
        selection_strategy: uniform
        optional: false

      # ── Lighting ────────────────────────────────────────────────
      - label: Key light
        role: lighting
        category: key
        tag_constraints:
          key_light: wall_lamps
        selection_strategy: uniform
        optional: false

