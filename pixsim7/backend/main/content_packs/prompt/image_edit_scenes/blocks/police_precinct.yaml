version: "1.0.0"

blocks:

  # ═══════════════════════════════════════════════════════════════════
  # POLICE PRECINCT — environment, wardrobe, placement, lighting, mood
  # ═══════════════════════════════════════════════════════════════════

  # ── wardrobe — police uniform rework ────────────────────────────

  - block_id: ie_style_police_uniform_01
    role: style
    category: aesthetic
    kind: single_state
    text: >-
      Police-uniform aesthetic with sleek, modern station presentation.
      Deep navy palette, polished insignia accents, clean seam geometry,
      structured waistband, and precise tailoring cues. Duty-ready details
      such as badge placement, belt line, and uniform paneling read clearly
      while the overall finish stays professional and intentional.
    tags:
      intent: modify
      aesthetic: police_uniform
      variant: sleek
      genre: police
      palette: dark_navy
      texture_family: smooth_wool
    complexity_level: complex

  - block_id: ie_style_police_uniform_02
    role: style
    category: aesthetic
    kind: single_state
    text: >-
      Modern duty-uniform aesthetic with matte technical fabric and clean
      regulation cues. Epaulettes, a sharp collar line, centered button
      placket, tidy pocket structure, and a polished buckle establish the
      police-uniform identity. The look should read contemporary, coherent,
      and professionally styled.
    tags:
      intent: modify
      aesthetic: police_uniform
      variant: duty
      genre: police
      palette: dark_navy
      texture_family: matte_stretch
    complexity_level: complex

  - block_id: ie_style_police_uniform_03
    role: style
    category: aesthetic
    kind: single_state
    text: >-
      Precinct uniform aesthetic with fashion-forward sharpness while
      remaining clearly police-coded. Dark navy near-black palette,
      crisp blouse and trouser structure, slim duty belt, and deliberate
      cuff and waist detailing. The overall read is controlled, polished,
      and stylized without losing uniform identity.
    tags:
      intent: modify
      aesthetic: police_uniform
      variant: tailored
      genre: police
      palette: dark_navy
      texture_family: smooth_tactical
    complexity_level: complex

  # ── wardrobe — su_lt-ry uniform variants (genre-generic) ────────
  #
  # These blocks do NOT name a specific genre. They reference
  # "the scene's implied dress code / uniform" and let the model
  # infer the genre from the environment and mood blocks already
  # present in the assembled prompt.

  - block_id: ie_style_sultry_uniform_01
    role: style
    category: wardrobe
    kind: single_state
    text: >-
      Reinterpret her outfit as a su_lt-ry, daring variant of whatever attire
      the surrounding scene implies. Keep the genre's palette and key signifiers
      — badges, buckles, insignia, period details — but shorten hemlines well
      above mid-thigh, bare the midriff or deepen the neckline, and tighten
      every panel until fabric maps each curve without ambiguity. The outfit
      should read as a deliberate fantasy version of the scene's dress code,
      not as regulation wear. Prioritise skin ratio and silhouette over
      authenticity.
    tags:
      intent: modify
      variant: sultry
      sensuality: high
    complexity_level: complex

  - block_id: ie_style_sultry_uniform_02
    role: style
    category: wardrobe
    kind: single_state
    text: >-
      Transform her clothing into a loosened, provo_ca-tive reading of the
      scene's implied uniform or dress code. Buttons undone to mid-sternum,
      shirt untucked or tied at the waist exposing bare skin between hem and
      waistband. Replace full-length bottoms with a fitted mini-skirt or
      short shorts in the same palette. Retain just enough genre markers —
      insignia, period fabric, rank hardware — for recognition, but strip
      coverage down until the outfit is barely functional. The look should
      feel like she chose to wear it this way.
    tags:
      intent: modify
      variant: sultry
      sensuality: high
    complexity_level: complex

  - block_id: ie_style_sultry_uniform_03
    role: style
    category: wardrobe
    kind: single_state
    text: >-
      Replace her outfit with a single-piece body-con garment that inherits
      the colour palette and texture vocabulary of whatever attire the scene's
      setting would normally dictate. The piece stops at upper thigh, fits
      without a wrinkle, and reveals shoulders, arms, and legs. Clip or pin
      one small genre-appropriate emblem at the neckline — a badge, brooch,
      crest, or insignia — as the sole reference to the original uniform.
      The rest is shape, skin, and fabric tension.
    tags:
      intent: modify
      variant: sultry
      sensuality: high
    complexity_level: complex

  # ── placement — coworker depth (close behind, police) ───────────

  - block_id: ie_place_coworker_behind_police_01
    role: placement
    category: depth
    kind: single_state
    default_intent: add
    text: >-
      {{coworker}} stands directly behind her at the coffee machine,
      angled inward. {{coworker}}'s hips are aligned with hers, separated
      only by the minimal clearance the narrow counter allows. {{coworker}}
      has not stepped back, chest nearly grazing her upper back while
      reaching forward.
    tags:
      intent: add
      layer: midground
      depth: close
      placement: behind
      visibility: full
      genre: police
    complexity_level: moderate

  - block_id: ie_place_coworker_behind_police_02
    role: placement
    category: depth
    kind: single_state
    default_intent: add
    text: >-
      {{coworker}} stands immediately behind and slightly to one side,
      belt line level with the curve of her lower back. The break room's
      tight layout presses {{coworker}} close — thigh nearly flush against
      the outside of hers, their bodies parallel at the counter.
    tags:
      intent: add
      layer: midground
      depth: close
      placement: behind
      visibility: full
      genre: police
    complexity_level: moderate

  - block_id: ie_place_coworker_behind_police_03
    role: placement
    category: depth
    kind: single_state
    default_intent: add
    text: >-
      {{coworker}} has stepped up behind her to use the machine, front
      aligned directly with her back. The counter leaves no lateral space
      to pass, so {{coworker}}'s body brackets hers from behind — close
      enough that any shift in weight would close the remaining distance
      entirely.
    tags:
      intent: add
      layer: midground
      depth: close
      placement: behind
      visibility: full
      genre: police
    complexity_level: moderate

  # ── placement — coworker character description ──────────────────

  - block_id: ie_char_coworker_police_01
    role: placement
    category: character_desc
    kind: single_state
    default_intent: add
    text: >-
      {{coworker}} wears the same precinct uniform, sleeves pushed to the
      forearms, collar loosened. {{coworker}} reaches past her to press a
      button on the machine, forearm crossing near her shoulder line, hand
      lingering on the counter beside her hip after the cup drops.
      {{coworker}}'s posture is unhurried and relaxed but angled inward —
      weight shifted onto the foot closest to her. {{coworker}}'s proximity
      lingers a fraction too long for routine, breathing steady, gaze
      following the line of her neck rather than the coffee filling the cup.
    tags:
      intent: add
      character_type: coworker
      posture: reaching_lingering
      proximity: intimate
      genre: police
    complexity_level: complex

  - block_id: ie_char_coworker_police_02
    role: placement
    category: character_desc
    kind: single_state
    default_intent: add
    text: >-
      Same duty uniform, top button undone, shoulders broad. {{coworker}}
      leans forward to take a cup, arm extending alongside hers, fingers
      almost overlapping on the counter edge. {{coworker}}'s hip presses
      the counter behind her, reducing the gap between them to fabric
      thickness. {{coworker}}'s chin tilts toward her ear as if about to
      speak, but the words haven't arrived yet — just warm breath and
      deliberate stillness. One hand rests on the counter behind her
      waist, not quite touching, a boundary acknowledged by millimetres
      rather than intention.
    tags:
      intent: add
      character_type: coworker
      posture: leaning_close
      proximity: intimate
      genre: police
    complexity_level: complex

  - block_id: ie_char_coworker_police_03
    role: placement
    category: character_desc
    kind: single_state
    default_intent: add
    text: >-
      {{coworker}} mirrors the precinct uniform, duty belt heavy at the
      waist. {{coworker}} reaches across her to grab a mug from the shelf,
      torso rotating so chest aligns with her shoulder blade. {{coworker}}'s
      other hand finds the counter on her opposite side, briefly enclosing
      her between both arms under the excuse of retrieving something.
      {{coworker}} withdraws slowly, dragging the moment, belt catching
      faintly against the small of her back while straightening.
      {{coworker}}'s expression stays neutral, professional — but
      {{coworker}}'s tempo says otherwise.
    tags:
      intent: add
      character_type: coworker
      posture: enclosing_reach
      proximity: intimate
      genre: police
    complexity_level: complex

  # ── lighting — station overhead ─────────────────────────────────

  - block_id: ie_key_station_overhead_01
    role: lighting
    category: key
    kind: single_state
    text: >-
      Overhead fluorescent station lights cast even, clinical illumination
      across the scene. Soft highlights trace seams, contours, and edges
      of dark fabric. The light falls without dramatic shadow, keeping
      forms legible and precise. Subtle reflections appear on chrome
      surfaces and glass partitions.
    tags:
      intent: modify
      key_light: station_overhead
      warmth: neutral_cool
      direction: overhead
      contrast: low
      genre: police
    complexity_level: moderate

  - block_id: ie_key_station_overhead_02
    role: lighting
    category: key
    kind: single_state
    text: >-
      Flat institutional ceiling panels provide broad overhead light,
      slightly cool in temperature. Dark fabrics absorb most of it, but
      polished metal surfaces — badges, buckles, hardware — create small
      bright points along silhouettes. All figures in the scene share the
      same even illumination field with no dramatic falloff between layers.
    tags:
      intent: modify
      key_light: station_overhead
      warmth: neutral_cool
      direction: overhead
      contrast: low
      genre: police
    complexity_level: moderate

  # ── mood — restrained sensual tension ───────────────────────────

  - block_id: ie_mood_restrained_sensual_01
    role: style
    category: atmosphere
    kind: single_state
    text: >-
      Mood: restrained sensual tension born from closeness, tailored form,
      and divided attention within a professional setting. Every element
      is technically innocent — a colleague using the same machine, a
      uniform that simply fits well, a partner waiting patiently — yet the
      framing, proximity, and fabric tension collaborate to suggest
      something unspoken. The narrow space does the work that neither
      figure acknowledges.
    tags:
      intent: modify
      atmosphere: restrained_sensual
      tension: high
      mood: warm
      genre: police
    complexity_level: moderate

  - block_id: ie_mood_restrained_sensual_02
    role: style
    category: atmosphere
    kind: single_state
    text: >-
      Mood: professional surface, sensual undercurrent. The break room
      reads as mundane — linoleum, fluorescent light, coffee ritual — but
      the depth layering tells a different story. Her sculpted uniform in
      the extreme foreground, {{coworker}}'s body pressed into her space
      at midground, and {{partner}} separated by glass in the background
      create a visual hierarchy of intimacy versus exclusion. Tension
      lives in the gap between what the scene shows and what it means.
    tags:
      intent: modify
      atmosphere: restrained_sensual
      tension: high
      mood: warm
      genre: police
    complexity_level: moderate

  - block_id: ie_mood_restrained_sensual_03
    role: style
    category: atmosphere
    kind: single_state
    text: >-
      Mood: quiet transgression under fluorescent light. Nothing explicit
      occurs — {{coworker}} reaches for coffee, she stands at the counter,
      {{partner}} waits outside. But the camera angle makes her uniform
      the visual subject, {{coworker}}'s closeness the visual verb, and
      the glass partition the visual sentence break. The mood is held in
      the fabric's tautness, the lingering hand, and the oblivious figure
      on the other side of the glass who sees only {{partner}}'s own
      reflection.
    tags:
      intent: modify
      atmosphere: restrained_sensual
      tension: high
      mood: warm
      genre: police
    complexity_level: moderate
