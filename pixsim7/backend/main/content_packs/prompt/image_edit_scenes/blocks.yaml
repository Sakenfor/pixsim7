      narrow aisle aligns with her existing stance, reading as if she
      stands naturally within the carriage.
    tags:
      intent: modify
      layer: background
      location: night_train
      setting_style: vintage_luxury
    complexity_level: complex

  - block_id: ie_bg_night_train_02
    role: environment
    category: scene_build
