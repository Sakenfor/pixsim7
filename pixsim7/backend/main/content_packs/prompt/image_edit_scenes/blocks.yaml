version: "1.0.0"
package_name: image_edit_scenes

defaults:
  source_type: library
  curation_status: curated
  is_public: true
  style: photorealistic
  created_by: content_pack
  default_intent: modify

blocks:

  # ═══════════════════════════════════════════════════════════════════
  # SUBJECT — preservation locks, one concern each
  # ═══════════════════════════════════════════════════════════════════

  - block_id: ie_lock_pose
    role: subject
    category: pose_lock
    kind: single_state
    default_intent: preserve
    text: >-
      Use the source image as the absolute structural base.
      Identical limb placement, torso angle, hip alignment, head orientation.
      No posture reinterpretation. The environment adapts around the subject.
    tags:
      intent: preserve
      layer: foreground
      lock: pose
    complexity_level: simple

  - block_id: ie_lock_identity
    role: subject
    category: identity_lock
    kind: single_state
    default_intent: preserve
    text: >-
      Preserve facial identity, body proportions, curves, and skin detail
      exactly as in the source image. No reinterpretation of features.
    tags:
      intent: preserve
      layer: foreground
      lock: identity
    complexity_level: simple

  - block_id: ie_lock_framing
    role: subject
    category: framing_lock
    kind: single_state
    default_intent: preserve
    text: >-
      Maintain the subject's framing scale, position in frame, and
      brightness/tonal range exactly as in the source image.
    tags:
      intent: preserve
      layer: foreground
      lock: framing
    complexity_level: simple

  # ═══════════════════════════════════════════════════════════════════
  # STYLE — reusable aesthetics (wardrobe, rendering, atmosphere)
  # ═══════════════════════════════════════════════════════════════════

  # ── wardrobe styles ──────────────────────────────────────────────

  - block_id: ie_style_medieval_thief
    role: style
    category: wardrobe
    kind: single_state
    text: >-
      Rework clothing into a rugged, belt-heavy medieval thief aesthetic
      while preserving garment length and silhouette.
      Fitted dark leather bodice following the natural contour precisely.
      Multiple layered belts crossing the waist and wrapping the hips at
      varied angles. Compact pouches and small metal loops along the belt line.
      Shorter asymmetrical overskirt consistent with the original hemline.
      Thigh-high stockings with integrated harness detailing.
      Distressed matte leather and heavy cloth in charcoal and deep brown tones.
    tags:
      intent: modify
      aesthetic: medieval_thief
      genre: fantasy
      palette: dark
      texture: leather
    complexity_level: complex

  - block_id: ie_style_cyberpunk
    role: style
    category: wardrobe
    kind: single_state
    text: >-
      Rework clothing into a cyberpunk streetwear aesthetic while preserving
      garment length and silhouette. Synthetic fabrics with subtle neon-thread
      accents. Cropped utility jacket with luminous piping along seams.
      Layered tech-fabric underlayers. Holographic belt buckle, cable-wrapped
      accessories. Dark base tones with electric blue or magenta highlights.
    tags:
      intent: modify
      aesthetic: cyberpunk
      genre: sci_fi
      palette: dark_neon
      texture: synthetic
    complexity_level: complex

  - block_id: ie_style_victorian_elegant
    role: style
    category: wardrobe
    kind: single_state
    text: >-
      Rework clothing into a refined Victorian evening aesthetic while
      preserving garment length and silhouette. Structured corset bodice
      with lace overlay. High collar with cameo brooch. Layered bustle skirt
      in rich fabric. Elbow-length gloves, pearl accents. Deep burgundy,
      midnight blue, or black with gold trim.
    tags:
      intent: modify
      aesthetic: victorian
      genre: period
      palette: rich
      texture: silk_lace
    complexity_level: complex

  - block_id: ie_style_athletic_minimal
    role: style
    category: wardrobe
    kind: single_state
    text: >-
      Rework clothing into clean athletic wear while preserving garment
      length and silhouette. Fitted sports bra or crop top, high-waisted
      leggings. Minimal accessories — one wristband, small earbuds.
      Matte performance fabrics in monochrome tones.
    tags:
      intent: modify
      aesthetic: athletic
      genre: modern
      palette: monochrome
      texture: performance
    complexity_level: moderate

  # ── rendering styles ─────────────────────────────────────────────

  - block_id: ie_style_game_stylized
    role: style
    category: rendering
    kind: single_state
    text: >-
      Rendering inspired by stylized game engines. Strong directional
      lighting creates defined highlight bands along surfaces. Deep shadow
      planes retain visible surface texture. Slightly elevated contrast
      and saturation compared to photographic realism. Clean edges,
      readable silhouettes.
    tags:
      intent: modify
      rendering: game_stylized
      contrast: elevated
      fidelity: stylized
    complexity_level: moderate

  - block_id: ie_style_film_noir
    role: style
    category: rendering
    kind: single_state
    text: >-
      Film noir rendering. High-contrast black and white with selective
      warm tones. Hard shadow lines, venetian blind patterns on walls.
      Cigarette smoke haze in light beams. Grain texture. Faces half-lit.
    tags:
      intent: modify
      rendering: film_noir
      contrast: extreme
      fidelity: stylized
    complexity_level: moderate

  - block_id: ie_style_hyperreal
    role: style
    category: rendering
    kind: single_state
    text: >-
      Hyper-realistic rendering. Every surface texture rendered at maximum
      detail — skin pores, fabric weave, metal scratches. Sharp across
      the entire depth of field. Studio-quality color accuracy.
      No stylization, no filters.
    tags:
      intent: modify
      rendering: hyperreal
      contrast: natural
      fidelity: maximum
    complexity_level: moderate

  # ── atmosphere / tone ────────────────────────────────────────────

  - block_id: ie_tone_predator
    role: style
    category: atmosphere
    kind: single_state
    text: >-
      Controlled predator atmosphere. Dramatic low-angle tension,
      silhouette-forward framing, narrow confined space, stylized contrast.
      The subject's pose remains completely unchanged.
    tags:
      intent: modify
      atmosphere: predator
      tension: high
      mood: dark
    complexity_level: moderate

  - block_id: ie_tone_romantic_soft
    role: style
    category: atmosphere
    kind: single_state
    text: >-
      Soft romantic atmosphere. Warm diffused light, gentle bokeh in
      background, intimate framing. Relaxed, inviting mood.
      Natural skin tones preserved.
    tags:
      intent: modify
      atmosphere: romantic
      tension: low
      mood: warm
    complexity_level: simple

  - block_id: ie_tone_tense_surveillance
    role: style
    category: atmosphere
    kind: single_state
    text: >-
      Surveillance tension atmosphere. Slightly desaturated palette,
      clinical overhead lighting mixed with security-camera grain.
      Voyeuristic distance, the subject unaware of being observed.
    tags:
      intent: modify
      atmosphere: surveillance
      tension: high
      mood: cold
    complexity_level: moderate

  # ═══════════════════════════════════════════════════════════════════
  # CAMERA — angle and field of view
  # ═══════════════════════════════════════════════════════════════════

  # ── camera angle ─────────────────────────────────────────────────

  - block_id: ie_cam_low_angle
    role: camera
    category: angle
    kind: single_state
    text: >-
      Camera positioned low near floor level, angled upward toward the
      subject. Vertical compression emphasized. The space feels tight
      and enclosed without altering the subject's posture.
    tags:
      intent: modify
      camera_angle: low
      perspective: upward
    complexity_level: simple

  - block_id: ie_cam_eye_level
    role: camera
    category: angle
    kind: single_state
    text: >-
      Camera at eye level, straight on. Neutral perspective with no
      vertical distortion. Natural spatial proportions.
    tags:
      intent: modify
      camera_angle: eye_level
      perspective: neutral
    complexity_level: simple

  - block_id: ie_cam_high_angle
    role: camera
    category: angle
    kind: single_state
    text: >-
      Camera positioned above, angled downward. The subject appears
      smaller in the space, environment visible around them.
      Slight foreshortening of vertical elements.
    tags:
      intent: modify
      camera_angle: high
      perspective: downward
    complexity_level: simple

  - block_id: ie_cam_dutch
    role: camera
    category: angle
    kind: single_state
    text: >-
      Camera tilted at a diagonal angle. Horizon line runs diagonally
      across the frame. Creates unease and visual tension.
    tags:
      intent: modify
      camera_angle: dutch
      perspective: tilted
    complexity_level: simple

  # ── field of view ────────────────────────────────────────────────

  - block_id: ie_fov_narrow
    role: camera
    category: fov
    kind: single_state
    text: >-
      Narrow field of view. Compressed depth, tight framing.
      Background elements appear closer. Telephoto feel.
    tags:
      intent: modify
      fov: narrow
    complexity_level: simple

  - block_id: ie_fov_wide
    role: camera
    category: fov
    kind: single_state
    text: >-
      Wide field of view. Expanded spatial context, more environment
      visible. Slight barrel distortion at edges. Environmental storytelling.
    tags:
      intent: modify
      fov: wide
    complexity_level: simple

  # ═══════════════════════════════════════════════════════════════════
  # LIGHTING — key and fill light sources
  # ═══════════════════════════════════════════════════════════════════

  # ── key light (primary) ─────────────────────────────────────────

  - block_id: ie_key_oil_lamp
    role: lighting
    category: key
    kind: single_state
    text: >-
      A single oil-lamp provides the primary light source.
      Strong directional warm light from the side and slightly above.
      Creates defined highlight bands along surfaces and contours.
      Deep shadow planes fall across the opposite side while retaining
      visible surface texture.
    tags:
      intent: modify
      key_light: oil_lamp
      warmth: warm
      direction: side_above
      contrast: high
    complexity_level: moderate

  - block_id: ie_key_ceiling_fixtures
    role: lighting
    category: key
    kind: single_state
    text: >-
      Normal indoor lighting from overhead ceiling fixtures.
      Even, bright exposure across the scene.
      Maintain the subject's original light direction and brightness.
      No dramatic shadows. No heavy contrast grading.
    tags:
      intent: modify
      key_light: ceiling
      warmth: neutral
      direction: overhead
      contrast: low
    complexity_level: simple

  - block_id: ie_key_directional_sun
    role: lighting
    category: key
    kind: single_state
    text: >-
      Strong directional sunlight from one side. Clear hard shadows
      on the opposite side. Warm color temperature.
      Highlights on skin and reflective surfaces.
    tags:
      intent: modify
      key_light: sun
      warmth: warm
      direction: side
      contrast: high
    complexity_level: simple

  - block_id: ie_key_neon_ambient
    role: lighting
    category: key
    kind: single_state
    text: >-
      Colored neon ambient lighting from multiple sources.
      Mixed warm and cool tones wash across surfaces.
      No single dominant direction — light wraps around forms.
      Saturated color spill on skin and clothing.
    tags:
      intent: modify
      key_light: neon
      warmth: mixed
      direction: ambient
      contrast: medium
    complexity_level: moderate

  # ── fill light (secondary) ─────────────────────────────────────

  - block_id: ie_fill_cool_slit
    role: lighting
    category: fill
    kind: single_state
    text: >-
      A subtle cool secondary fill from a distant slit window.
      Preserves dimensional separation and prevents silhouette flattening.
    tags:
      intent: modify
      fill_light: cool_slit
      warmth: cool
      purpose: separation
    complexity_level: simple

  - block_id: ie_fill_warm_bounce
    role: lighting
    category: fill
    kind: single_state
    text: >-
      Warm bounce light reflected from nearby surfaces.
      Softens shadow edges without eliminating them.
      Adds warmth to shadow regions.
    tags:
      intent: modify
      fill_light: warm_bounce
      warmth: warm
      purpose: shadow_softening
    complexity_level: simple

  - block_id: ie_fill_none
    role: lighting
    category: fill
    kind: single_state
    text: >-
      No secondary fill light. Shadows fall to near-black.
      Maximum contrast between lit and unlit surfaces.
      Silhouette effect on the shadow side.
    tags:
      intent: modify
      fill_light: none
      warmth: none
      purpose: maximum_contrast
    complexity_level: simple

  # ═══════════════════════════════════════════════════════════════════
  # ENVIRONMENT — scene backgrounds
  # ═══════════════════════════════════════════════════════════════════

  - block_id: ie_bg_hotel_lobby
    role: environment
    category: scene_build
    kind: single_state
    text: >-
      Modern hotel lobby behind the subject's current position.
      Polished floors, reception desk in background, warm ambient light.
    tags:
      intent: modify
      layer: background
      location: hotel_lobby
      setting_style: modern
    complexity_level: moderate

  - block_id: ie_bg_office
    role: environment
    category: scene_build
    kind: single_state
    text: >-
      Sleek corporate office behind the subject's current position.
      Glass walls, city skyline visible through windows.
    tags:
      intent: modify
      layer: background
      location: office
      setting_style: modern
    complexity_level: moderate

  - block_id: ie_bg_park_daylight
    role: environment
    category: scene_build
    kind: single_state
    text: >-
      Sunlit park behind the subject's current position.
      Trees, open grass, benches, natural daylight.
    tags:
      intent: modify
      layer: background
      location: park
      setting_style: natural
    complexity_level: moderate

  - block_id: ie_bg_nightclub
    role: environment
    category: scene_build
    kind: single_state
    text: >-
      Dimly lit nightclub interior behind the subject's current position.
      Ambient colored lighting, bar area visible, silhouettes of other patrons.
    tags:
      intent: modify
      layer: background
      location: nightclub
      setting_style: atmospheric
    complexity_level: moderate

  - block_id: ie_bg_undercity_corridor
    role: environment
    category: scene_build
    kind: single_state
    text: >-
      Narrow undercity bar corridor with rough stone walls close on both
      sides and low timber beams overhead. Depth recedes diagonally into
      shadow rather than forming a corner.
    tags:
      intent: modify
      layer: background
      location: undercity_corridor
      setting_style: medieval_dark
    complexity_level: moderate

  # ═══════════════════════════════════════════════════════════════════
  # PLACEMENT — depth positioning & placed character descriptions
  # ═══════════════════════════════════════════════════════════════════

  # ── depth positioning ──────────────────────────────────────────

  - block_id: ie_place_close_behind
    role: placement
    category: depth
    kind: single_state
    default_intent: add
    text: >-
      {{placed_character}} stands immediately behind the subject, slightly
      smaller in scale due to depth. Very close, almost directly behind.
    tags:
      intent: add
      layer: midground
      depth: close
      placement: behind
      visibility: full
    complexity_level: moderate

  - block_id: ie_place_far_background
    role: placement
    category: depth
    kind: single_state
    default_intent: add
    text: >-
      {{placed_character}} stands clearly farther away in the open space.
      Several steps back, appearing noticeably smaller due to distance.
    tags:
      intent: add
      layer: background
      depth: far
      placement: open_space
      visibility: full
    complexity_level: moderate

  - block_id: ie_place_beside
    role: placement
    category: depth
    kind: single_state
    default_intent: add
    text: >-
      {{placed_character}} stands beside the subject at roughly the same
      depth, similar scale, positioned to one side.
    tags:
      intent: add
      layer: foreground
      depth: same
      placement: beside
      visibility: full
    complexity_level: simple

  - block_id: ie_place_partial_midground
    role: placement
    category: depth
    kind: single_state
    default_intent: add
    text: >-
      A presence enters from the frame edge at midground height —
      partial torso and shoulder visible, angled toward the subject.
      Fully three-dimensional and integrated into the same lighting field,
      adding spatial compression without touching or repositioning the subject.
    tags:
      intent: add
      layer: midground
      depth: mid
      placement: frame_edge
      visibility: partial
    complexity_level: moderate

  # ── placed character descriptions ──────────────────────────────

  - block_id: ie_char_porter_uniform
    role: placement
    category: character_desc
    kind: single_state
    default_intent: add
    text: >-
      He wears a hotel porter uniform and stands attentively.
      One hand rests lightly near the subject's side as if assisting
      or steadying something.
    tags:
      intent: add
      character_type: porter
      attire: uniform
    complexity_level: moderate

  - block_id: ie_char_distracted_man
    role: placement
    category: character_desc
    kind: single_state
    default_intent: add
    text: >-
      He is facing away from the subject, looking at his phone.
      Casual posture, visibly absorbed in the screen, unaware of
      his surroundings.
    tags:
      intent: add
      character_type: bystander
      posture: distracted
    complexity_level: moderate

  - block_id: ie_char_male_presence
    role: placement
    category: character_desc
    kind: single_state
    default_intent: add
    text: >-
      A male figure, partially visible. Angled toward the subject.
      Integrated into the scene lighting. Physical presence without
      narrative specificity.
    tags:
      intent: add
      character_type: male_presence
      posture: angled
    complexity_level: simple

  # ═══════════════════════════════════════════════════════════════════
  # COMPOSITION — layer ordering
  # ═══════════════════════════════════════════════════════════════════

  - block_id: ie_layers_three_depth
    role: composition
    category: layer_order
    kind: single_state
    text: >-
      Layer order:
      Foreground — subject unchanged.
      Midground — secondary presence close behind.
      Far background — environment recedes into depth.
      Clear spatial separation at each layer.
    tags:
      intent: modify
      depth_layers: 3
    complexity_level: simple

  - block_id: ie_layers_two_depth
    role: composition
    category: layer_order
    kind: single_state
    text: >-
      Layer order:
      Foreground — subject unchanged.
      Background — scene elements at natural depth.
      Clear separation between subject and background.
    tags:
      intent: modify
      depth_layers: 2
    complexity_level: simple

  # ═══════════════════════════════════════════════════════════════════
  # ENVIRONMENT — Victorian study variants
  # ═══════════════════════════════════════════════════════════════════

  - block_id: ie_bg_victorian_study_01
    role: environment
    category: scene_build
    kind: single_state
    text: >-
      Place her inside a worn Victorian study. Heavy wooden desk cluttered
      with scattered case papers, maps, and handwritten notes. The desk
      aligns naturally with her current posture so she appears leaned
      slightly forward over it without changing her pose. Bookshelves line
      the walls, leather-bound volumes packed tight, a globe on a side table.
    tags:
      intent: modify
      layer: background
      location: victorian_study
      setting_style: period
      genre: detective
    complexity_level: complex

  - block_id: ie_bg_victorian_study_02
    role: environment
    category: scene_build
    kind: single_state
    text: >-
      Place her in a cluttered detective's study. Oak-panelled walls,
      a broad writing desk covered in open folders, magnifying glass,
      ink bottles, and a half-rolled map pinned at the corners. A worn
      armchair sits beside the desk. Curtains are drawn, sealing the
      room from the outside world.
    tags:
      intent: modify
      layer: background
      location: victorian_study
      setting_style: period
      genre: detective
    complexity_level: complex

  - block_id: ie_bg_victorian_study_03
    role: environment
    category: scene_build
    kind: single_state
    text: >-
      Place her in a small private study off a larger library. The desk
      is narrower, papers stacked in precarious columns, a brass desk
      lamp unlit, a coat draped over the chair behind her. The walls
      close in — the space is intimate by architecture, not choice.
    tags:
      intent: modify
      layer: background
      location: victorian_study
      setting_style: period
      genre: detective
    complexity_level: complex

  # ═══════════════════════════════════════════════════════════════════
  # LIGHTING — gas-lamp intimate variants
  # ═══════════════════════════════════════════════════════════════════

  - block_id: ie_key_gas_lamp_01
    role: lighting
    category: key
    kind: single_state
    text: >-
      Warm gas-lamp light pools softly across the desk surface and her
      figure, creating a cozy enclosed atmosphere. Avoid sharp outlines
      or dramatic edge highlights. Illumination should feel close and
      atmospheric, falling off into deep amber shadow at the room edges.
    tags:
      intent: modify
      key_light: gas_lamp
      warmth: warm
      direction: desk_level
      contrast: low
      genre: detective
    complexity_level: moderate

  - block_id: ie_key_gas_lamp_02
    role: lighting
    category: key
    kind: single_state
    text: >-
      Two gas-lamp sconces on the wall behind cast overlapping pools
      of amber light. The illumination wraps around both figures from
      behind and above, creating warm rim-light on hair and shoulders
      while the desk surface glows from reflected light below.
    tags:
      intent: modify
      key_light: gas_lamp
      warmth: warm
      direction: behind_above
      contrast: medium
      genre: detective
    complexity_level: moderate

  - block_id: ie_key_gas_lamp_03
    role: lighting
    category: key
    kind: single_state
    text: >-
      A single desk lamp with a green glass shade provides the only
      light source, casting a concentrated warm pool across the papers
      and her hands. Everything beyond arm's reach dissolves into soft
      darkness. Faces are lit from below and to the side.
    tags:
      intent: modify
      key_light: gas_lamp
      warmth: warm
      direction: desk_below
      contrast: high
      genre: detective
    complexity_level: moderate

  - block_id: ie_fill_fireplace_glow
    role: lighting
    category: fill
    kind: single_state
    text: >-
      Low fireplace glow from across the room provides a faint secondary
      fill, adding warmth to the shadow side without competing with the
      primary light. Embers pulse slightly, casting barely perceptible
      movement into the stillness.
    tags:
      intent: modify
      fill_light: fireplace
      warmth: warm
      purpose: shadow_softening
      genre: detective
    complexity_level: simple

  # ═══════════════════════════════════════════════════════════════════
  # STYLE — wardrobe accents (subtle modification)
  # ═══════════════════════════════════════════════════════════════════

  - block_id: ie_style_victorian_accent_01
    role: style
    category: wardrobe
    kind: single_state
    text: >-
      Keep her clothing unchanged except for one subtle period accent
      integrated naturally into what she already wears — a thin cameo
      ribbon at the throat, or lace trim visible at a cuff. Maintain
      her exact silhouette. The accent should feel incidental, not
      costumed.
    tags:
      intent: modify
      aesthetic: victorian_accent
      genre: period
      modification: minimal
    complexity_level: simple

  - block_id: ie_style_victorian_accent_02
    role: style
    category: wardrobe
    kind: single_state
    text: >-
      Her clothing remains as-is with a single subtle addition — a small
      pocket watch on a chain tucked into a pocket or looped at the waist.
      The metal catches the gas-light. Her silhouette does not change.
    tags:
      intent: modify
      aesthetic: victorian_accent
      genre: period
      modification: minimal
    complexity_level: simple

  - block_id: ie_style_victorian_accent_03
    role: style
    category: wardrobe
    kind: single_state
    text: >-
      Clothing unchanged. A single dark velvet ribbon is tied loosely at
      her wrist or around her fingers, as if she absently picked it up
      from the desk. It reads as a found object, not a deliberate accessory.
    tags:
      intent: modify
      aesthetic: victorian_accent
      genre: period
      modification: minimal
    complexity_level: simple

  # ═══════════════════════════════════════════════════════════════════
  # ACTIVITY — what the subject is doing at the desk
  # ═══════════════════════════════════════════════════════════════════

  - block_id: ie_activity_sifting_papers_01
    role: action
    category: desk_activity
    kind: single_state
    text: >-
      She is idly sifting through his papers, lifting and shifting
      documents in a deliberately careless way, creating mild disorder
      across the desk. Pages slide, overlap, and drift off alignment.
    tags:
      intent: modify
      activity: paper_sifting
      mood: playful
      genre: detective
    complexity_level: moderate

  - block_id: ie_activity_sifting_papers_02
    role: action
    category: desk_activity
    kind: single_state
    text: >-
      She turns pages without reading them, fingertips dragging across
      handwritten lines, occasionally lifting a sheet to peer at the one
      beneath, then letting it fall back at a different angle than she
      found it.
    tags:
      intent: modify
      activity: paper_sifting
      mood: playful
      genre: detective
    complexity_level: moderate

  - block_id: ie_activity_sifting_papers_03
    role: action
    category: desk_activity
    kind: single_state
    text: >-
      She holds a folded map open with one hand, her other hand idly
      rearranging the notes beneath it, stacking and unstacking without
      system, the careful order of the desk slowly dismantling under
      her attention.
