version: "1.0.0"
package_name: image_edit_scenes

defaults:
  source_type: library
  curation_status: curated
  is_public: true
  style: photorealistic
  created_by: content_pack
  default_intent: modify

blocks:

  # ═══════════════════════════════════════════════════════════════════
  # STYLE — scene-specific aesthetics
  # ═══════════════════════════════════════════════════════════════════

  - block_id: ie_style_medieval_thief
    role: style
    category: aesthetic
    kind: single_state
    text: >-
      Rugged, belt-heavy medieval thief aesthetic. Dark leather fitted closely
      to the natural contour. Multiple layered belts crossing the waist and
      wrapping the hips at varied angles. Compact pouches and small metal loops
      along the belt line. Integrated harness detailing at the thigh. Distressed
      matte leather and heavy cloth in charcoal and deep brown tones.
    tags:
      intent: modify
      aesthetic: medieval_thief
      variant: utility
      genre: fantasy
      palette: dark
    complexity_level: complex

  - block_id: ie_style_medieval_thief_02
    role: style
    category: aesthetic
    kind: single_state
    text: >-
      Shadow-operative thief aesthetic. Close-fitted dark materials with minimal
      hardware. Single utility strap across the torso. Low-profile attachment
      points; nothing protrudes or catches. Surfaces flat and non-reflective.
    tags:
      intent: modify
      aesthetic: medieval_thief
      variant: shadow
      genre: fantasy
      palette: dark
    complexity_level: moderate

  - block_id: ie_style_medieval_thief_03
    role: style
    category: aesthetic
    kind: single_state
    text: >-
      Outlaw rogue aesthetic. Layered strapping with visible wear and improvised
      repair. Metal ring and loop details at irregular intervals. Asymmetric
      balance across the torso and hips. Materials distressed and patched rather
      than purpose-built.
    tags:
      intent: modify
      aesthetic: medieval_thief
      variant: outlaw
      genre: fantasy
      palette: dark
    complexity_level: moderate

  - block_id: ie_style_medieval_thief_04
    role: style
    category: aesthetic
    kind: single_state
    text: >-
      Guild-trained thief aesthetic. Deliberate strap geometry with riveted
      reinforcement at key stress points. Uniform attachment hardware along a
      consistent line. Close, controlled fit with minimal excess material.
      Purposeful and precise.
    tags:
      intent: modify
      aesthetic: medieval_thief
      variant: guild
      genre: fantasy
      palette: dark
    complexity_level: moderate

  - block_id: ie_style_cyberpunk
    role: style
    category: aesthetic
    kind: single_state
    text: >-
      Cyberpunk streetwear aesthetic. Synthetic fabrics with subtle neon-thread
      accents. Luminous piping along seams. Layered tech-fabric underlayers.
      Holographic and cable-wrapped hardware details. Dark base tones with
      electric blue or magenta highlights.
    tags:
      intent: modify
      aesthetic: cyberpunk
      genre: sci_fi
      palette: dark_neon
    complexity_level: complex

  - block_id: ie_style_victorian_elegant
    role: style
    category: aesthetic
    kind: single_state
    text: >-
      Refined Victorian evening aesthetic. Structured corset bodice with lace
      overlay. High collar with cameo brooch. Layered bustle skirt in rich
      fabric. Elbow-length gloves, pearl accents. Deep burgundy, midnight blue,
      or black with gold trim.
    tags:
      intent: modify
      aesthetic: victorian
      genre: period
      palette: rich
    complexity_level: complex

  - block_id: ie_style_athletic_minimal
    role: style
    category: aesthetic
    kind: single_state
    text: >-
      Clean athletic aesthetic. Fitted sports bra or crop top, high-waisted
      leggings. Minimal accessories — one wristband, small earbuds. Matte
      performance fabrics in monochrome tones.
    tags:
      intent: modify
      aesthetic: athletic
      genre: modern
      palette: monochrome
    complexity_level: moderate

  # ── atmosphere / tone (scene-specific) ─────────────────────────

  - block_id: ie_tone_predator
    role: style
    category: atmosphere
    kind: single_state
    text: >-
      Controlled predator atmosphere. Dramatic low-angle tension,
      silhouette-forward framing, narrow confined space, stylized contrast.
      {{subject}}'s pose remains completely unchanged.
    tags:
      intent: modify
      atmosphere: predator
      tension: high
      mood: dark
    complexity_level: moderate

  # ═══════════════════════════════════════════════════════════════════
  # LIGHTING — scene-specific key and fill
  # ═══════════════════════════════════════════════════════════════════

  - block_id: ie_key_oil_lamp
    role: lighting
    category: key
    kind: single_state
    text: >-
      A single oil-lamp provides the primary light source.
      Strong directional warm light from the side and slightly above.
      Creates defined highlight bands along surfaces and contours.
      Deep shadow planes fall across the opposite side while retaining
      visible surface texture.
    tags:
      intent: modify
      key_light: oil_lamp
      warmth: warm
      direction: side_above
      contrast: high
    complexity_level: moderate

  # ═══════════════════════════════════════════════════════════════════
  # ENVIRONMENT — scene backgrounds
  # ═══════════════════════════════════════════════════════════════════

  - block_id: ie_bg_hotel_lobby
    role: environment
    category: scene_build
    kind: single_state
    text: >-
      Modern hotel lobby behind {{subject}}'s current position.
      Polished floors, reception desk in background, warm ambient light.
    tags:
      intent: modify
      layer: background
      location: hotel_lobby
      setting_style: modern
    complexity_level: moderate

  - block_id: ie_bg_office
    role: environment
    category: scene_build
    kind: single_state
    text: >-
      Sleek corporate office behind {{subject}}'s current position.
      Glass walls, city skyline visible through windows.
    tags:
      intent: modify
      layer: background
      location: office
      setting_style: modern
    complexity_level: moderate

  - block_id: ie_bg_park_daylight
    role: environment
    category: scene_build
    kind: single_state
    text: >-
      Sunlit park behind {{subject}}'s current position.
      Trees, open grass, benches, natural daylight.
    tags:
      intent: modify
      layer: background
      location: park
      setting_style: natural
    complexity_level: moderate

  - block_id: ie_bg_nightclub
    role: environment
    category: scene_build
    kind: single_state
    text: >-
      Dimly lit nightclub interior behind {{subject}}'s current position.
      Ambient colored lighting, bar area visible, silhouettes of other patrons.
    tags:
      intent: modify
      layer: background
      location: nightclub
      setting_style: atmospheric
    complexity_level: moderate

  - block_id: ie_bg_undercity_corridor
    role: environment
    category: scene_build
    kind: single_state
    text: >-
      Narrow undercity bar corridor with rough stone walls close on both
      sides and low timber beams overhead. Depth recedes diagonally into
      shadow rather than forming a corner.
    tags:
      intent: modify
      layer: background
      location: undercity_corridor
      setting_style: medieval_dark
    complexity_level: moderate

  # ═══════════════════════════════════════════════════════════════════
  # PLACEMENT — scene-specific character descriptions
  # ═══════════════════════════════════════════════════════════════════

  - block_id: ie_char_porter_uniform
    role: placement
    category: character_desc
    kind: single_state
    default_intent: add
    text: >-
      He wears a hotel porter uniform and stands attentively.
      One hand rests lightly near {{subject}}'s side as if assisting
      or steadying something.
    tags:
      intent: add
      character_type: porter
      attire: uniform
    complexity_level: moderate

  - block_id: ie_char_distracted_man
    role: placement
    category: character_desc
    kind: single_state
    default_intent: add
    text: >-
      He is facing away from {{subject}}, looking at his phone.
      Casual posture, visibly absorbed in the screen, unaware of
      his surroundings.
    tags:
      intent: add
      character_type: bystander
      posture: distracted
    complexity_level: moderate

  - block_id: ie_char_male_presence
    role: placement
    category: character_desc
    kind: single_state
    default_intent: add
    text: >-
      A male figure, partially visible. Angled toward {{subject}}.
      Integrated into the scene lighting. Physical presence without
      narrative specificity.
    tags:
      intent: add
      character_type: male_presence
      posture: angled
    complexity_level: simple


  # ═══════════════════════════════════════════════════════════════════
  # SUBJECT — clothing preservation lock
  # ═══════════════════════════════════════════════════════════════════

  - block_id: ie_lock_clothing_01
    role: subject
    category: clothing_lock
    kind: single_state
    default_intent: preserve
    text: >-
      {{subject}}'s clothing remains exactly as it appears in the source image.
      No added layers, no redesign, no structural changes. Maintain
      fabric type, fit, coverage, and colour precisely. The outfit
      integrates into the new environment without modification.
    tags:
      intent: preserve
      layer: foreground
      lock: clothing
    complexity_level: simple

  - block_id: ie_lock_clothing_02
    role: subject
    category: clothing_lock
    kind: single_state
    default_intent: preserve
    text: >-
      Preserve every aspect of {{subject}}'s clothing exactly as-is — cut, colour,
      fabric, layering, accessories. Do not adapt, stylise, or reinterpret
      any garment to match the surrounding scene. {{subject}} wears what they wear;
      the environment conforms to {{subject}}, not the reverse.
    tags:
      intent: preserve
      layer: foreground
      lock: clothing
    complexity_level: simple


  # ═══════════════════════════════════════════════════════════════════
  # CAMERA — generic directives (reusable across templates)
  # ═══════════════════════════════════════════════════════════════════

  - block_id: ie_cam_lock_observer
    role: camera
    category: camera_lock
    kind: single_state
    text: >-
      Camera remains a fixed observer throughout. The vantage holds
      steady from start to finish, framing the scene from its
      established position.
    tags:
      intent: preserve
      camera: observer_lock
      direction: lateral_or_receding
    complexity_level: simple

  - block_id: ie_cam_lock_observer_02
    role: camera
    category: camera_lock
    kind: single_state
    text: >-
      The camera maintains a steady third-person vantage. The framing
      stays consistent, observing rather than participating. The lens
      holds its distance and angle throughout.
    tags:
      intent: preserve
      camera: observer_lock
      direction: lateral_or_receding
    complexity_level: simple

  # ═══════════════════════════════════════════════════════════════════
  # CAMERA — over-shoulder angles (generic)
  # ═══════════════════════════════════════════════════════════════════

  - block_id: ie_cam_over_shoulder_01
    role: camera
    category: angle
    kind: single_state
    text: >-
      Camera positioned behind and slightly above one figure's shoulder,
      looking past them into the scene. The shoulder and upper arm form
      a soft foreground frame on one side, giving depth and a voyeuristic
      intimacy to the composition. Shallow depth of field keeps the
      shoulder soft while the subject beyond stays sharp.
    tags:
      intent: modify
      camera_angle: over_shoulder
      depth: layered
    complexity_level: moderate

  - block_id: ie_cam_over_shoulder_02
    role: camera
    category: angle
    kind: single_state
    text: >-
      Over-the-shoulder framing from behind the rearmost figure. The
      camera sits at their ear height, their silhouette occupying the
      left or right third of the frame while the subject fills the
      remaining space. The asymmetry creates natural tension between
      the two focal planes.
    tags:
      intent: modify
      camera_angle: over_shoulder
      depth: layered
    complexity_level: moderate

  - block_id: ie_cam_over_shoulder_03
    role: camera
    category: angle
    kind: single_state
    text: >-
      Tight over-shoulder angle, the camera nearly resting on the
      rearmost figure's collarbone. Their shoulder fills the lower
      foreground, slightly out of focus, while the subject is framed
      in sharp relief just beyond. The closeness of the camera to
      the rear figure implies shared perspective — the viewer sees
      what they see, from where they stand.
    tags:
      intent: modify
      camera_angle: over_shoulder
      depth: layered
    complexity_level: moderate

  # ═══════════════════════════════════════════════════════════════════
  # PLACEMENT — generic close-behind depth (spatial only)
  # ═══════════════════════════════════════════════════════════════════

  - block_id: ie_place_close_behind_01
    role: placement
    category: depth
    kind: single_state
    default_intent: add
    text: >-
      A figure stands directly behind her, separated by inches. The
      space they share is narrow enough that proximity is imposed by
      architecture rather than intention — neither has room to step
      aside without contact.
    tags:
      intent: add
      layer: midground
      depth: close
      placement: behind
      visibility: full
    complexity_level: simple

  - block_id: ie_place_close_behind_02
    role: placement
    category: depth
    kind: single_state
    default_intent: add
    text: >-
      He stands immediately behind and slightly offset, his body
      angled toward hers. The gap between them is a single breath
      wide — close enough that any shift in weight from either side
      would erase it entirely.
    tags:
      intent: add
      layer: midground
      depth: close
      placement: behind
      visibility: full
    complexity_level: simple

  - block_id: ie_place_close_behind_03
    role: placement
    category: depth
    kind: single_state
    default_intent: add
    text: >-
      A figure positioned directly behind her, their front aligned
      with her back, the vertical lines of both silhouettes nearly
      overlapping in the frame. The tight clearance reads as
      deliberate stillness rather than casual proximity.
    tags:
      intent: add
      layer: midground
      depth: close
      placement: behind
      visibility: full
    complexity_level: simple

  # ═══════════════════════════════════════════════════════════════════
  # CAMERA — drift behind (generic opening moves)
  # ═══════════════════════════════════════════════════════════════════

  - block_id: cam_drift_behind_01
    role: camera
    category: drift
    kind: single_state
    text: >-
      The camera holds at a low angle directly at her re_a-r, her
      posterior centered in frame, a slow subtle drift settles the
      framing tighter on her hi_p-s and lower back, smooth cinematic
      movement with no rotation of her body
    tags:
      camera: drift_behind
      motion: drift
      temporal_position: opening
    complexity_level: simple

  - block_id: cam_drift_behind_02
    role: camera
    category: drift
    kind: single_state
    text: >-
      The camera drifts subtly from its starting position, easing
      into a tighter framing without repositioning her body, the
      existing composition preserved as the depth of field narrows
      and the background softens into bokeh
    tags:
      camera: drift_behind
      motion: drift
      temporal_position: opening
    complexity_level: moderate

  - block_id: cam_drift_behind_03
    role: camera
    category: drift
    kind: single_state
    text: >-
      A slow tracking shot at her re_a-r, the framing tilting
      downward as it settles on a low three-quarter re_a-r angle, her
      posterior sharp in focus, the shallow depth of field blurring the
      background while her silhouette sharpens into crisp relief
    tags:
      camera: drift_behind
      motion: drift
      temporal_position: opening
    complexity_level: moderate

  - block_id: cam_drift_behind_04
    role: camera
    category: drift
    kind: single_state
    text: >-
      Handheld-style camera floats at waist height, drifting laterally
      and then curving around behind her in one unbroken take, the
      slight motion blur lending immediacy, the final framing centered
      on the small of her back
    tags:
      camera: drift_behind
      motion: drift
      temporal_position: opening
    complexity_level: simple

  - block_id: cam_drift_behind_05
    role: camera
    category: drift
    kind: single_state
    text: >-
      The camera rises from floor level behind her, climbing in a
      smooth crane-like arc, the low start emphasizing the ground
      and her stance before settling at hip height, the wide angle
      compressing the space between her and whatever is behind
    tags:
      camera: drift_behind
      motion: drift
      temporal_position: opening
    complexity_level: moderate

  # ═══════════════════════════════════════════════════════════════════
  # SETTING — generic interior/exterior atmosphere
  # ═══════════════════════════════════════════════════════════════════

  - block_id: setting_warm_interior
    role: setting
    category: atmosphere
    kind: single_state
    text: >-
      Warm interior light fills the room, late afternoon sun cutting
      through half-drawn blinds in golden bars, the floor is hardwood,
      the space intimate, a sofa and low table defining the boundary
      of the scene
    tags:
      tone: warm
      setting: interior
    complexity_level: simple

  - block_id: setting_bedroom_amber
    role: setting
    category: atmosphere
    kind: single_state
    text: >-
      A dimly lit bedroom, sheets rumpled, a single lamp casting a
      cone of amber light across the bed and floor, shadows pooling
      in the corners, the air close and still
    tags:
      tone: intimate
      setting: interior
    complexity_level: simple

  - block_id: setting_secluded_patio
    role: setting
    category: atmosphere
    kind: single_state
    text: >-
      Outside on a secluded patio, trees screening the view, dappled
      light shifting across the stone floor, a low bench along one
      wall, the quiet broken only by birdsong and the distant hum
      of wind through leaves
    tags:
      tone: warm
      setting: exterior
    complexity_level: simple

  # ═══════════════════════════════════════════════════════════════════
  # ENVIRONMENT — generic real-world scene semantics fallback
  # ═══════════════════════════════════════════════════════════════════

  - block_id: ie_scene_generic_real_01
    role: environment
    category: scene_build
    kind: single_state
    default_intent: preserve
    text: >-
      Preserve the existing setting as shown in the source image.
      Maintain architectural lines, surface textures, and ambient
      lighting of the original environment.
    tags:
      scene_scope: generic_real_world
      edit_mode: image_edit
      intent: preserve
    complexity_level: simple

  - block_id: ie_scene_generic_real_02
    role: environment
    category: scene_build
    kind: single_state
    default_intent: preserve
    text: >-
      Keep the real-world environment from the source image intact.
      Background elements, spatial depth, and natural lighting
      conditions remain unaltered.
    tags:
      scene_scope: generic_real_world
      edit_mode: image_edit
      intent: preserve
    complexity_level: simple
