version: "1.0.0"
package_name: image_edit_scenes

defaults:
  source_type: library
  curation_status: curated
  is_public: true
  style: photorealistic
  created_by: content_pack
  default_intent: modify

blocks:

  # ═══════════════════════════════════════════════════════════════════
  # STYLE — scene-specific wardrobe styles
  # ═══════════════════════════════════════════════════════════════════

  - block_id: ie_style_medieval_thief
    role: style
    category: wardrobe
    kind: single_state
    text: >-
      Rework clothing into a rugged, belt-heavy medieval thief aesthetic
      while preserving garment length and silhouette.
      Fitted dark leather bodice following the natural contour precisely.
      Multiple layered belts crossing the waist and wrapping the hips at
      varied angles. Compact pouches and small metal loops along the belt line.
      Shorter asymmetrical overskirt consistent with the original hemline.
      Thigh-high stockings with integrated harness detailing.
      Distressed matte leather and heavy cloth in charcoal and deep brown tones.
    tags:
      intent: modify
      aesthetic: medieval_thief
      genre: fantasy
      palette: dark
      texture: leather
    complexity_level: complex

  - block_id: ie_style_cyberpunk
    role: style
    category: wardrobe
    kind: single_state
    text: >-
      Rework clothing into a cyberpunk streetwear aesthetic while preserving
      garment length and silhouette. Synthetic fabrics with subtle neon-thread
      accents. Cropped utility jacket with luminous piping along seams.
      Layered tech-fabric underlayers. Holographic belt buckle, cable-wrapped
      accessories. Dark base tones with electric blue or magenta highlights.
    tags:
      intent: modify
      aesthetic: cyberpunk
      genre: sci_fi
      palette: dark_neon
      texture: synthetic
    complexity_level: complex

  - block_id: ie_style_victorian_elegant
    role: style
    category: wardrobe
    kind: single_state
    text: >-
      Rework clothing into a refined Victorian evening aesthetic while
      preserving garment length and silhouette. Structured corset bodice
      with lace overlay. High collar with cameo brooch. Layered bustle skirt
      in rich fabric. Elbow-length gloves, pearl accents. Deep burgundy,
      midnight blue, or black with gold trim.
    tags:
      intent: modify
      aesthetic: victorian
      genre: period
      palette: rich
      texture: silk_lace
    complexity_level: complex

  - block_id: ie_style_athletic_minimal
    role: style
    category: wardrobe
    kind: single_state
    text: >-
      Rework clothing into clean athletic wear while preserving garment
      length and silhouette. Fitted sports bra or crop top, high-waisted
      leggings. Minimal accessories — one wristband, small earbuds.
      Matte performance fabrics in monochrome tones.
    tags:
      intent: modify
      aesthetic: athletic
      genre: modern
      palette: monochrome
      texture: performance
    complexity_level: moderate

  # ── atmosphere / tone (scene-specific) ─────────────────────────

  - block_id: ie_tone_predator
    role: style
    category: atmosphere
    kind: single_state
    text: >-
      Controlled predator atmosphere. Dramatic low-angle tension,
      silhouette-forward framing, narrow confined space, stylized contrast.
      The subject's pose remains completely unchanged.
    tags:
      intent: modify
      atmosphere: predator
      tension: high
      mood: dark
    complexity_level: moderate

  # ═══════════════════════════════════════════════════════════════════
  # LIGHTING — scene-specific key and fill
  # ═══════════════════════════════════════════════════════════════════

  - block_id: ie_key_oil_lamp
    role: lighting
    category: key
    kind: single_state
    text: >-
      A single oil-lamp provides the primary light source.
      Strong directional warm light from the side and slightly above.
      Creates defined highlight bands along surfaces and contours.
      Deep shadow planes fall across the opposite side while retaining
      visible surface texture.
    tags:
      intent: modify
      key_light: oil_lamp
      warmth: warm
      direction: side_above
      contrast: high
    complexity_level: moderate

  # ═══════════════════════════════════════════════════════════════════
  # ENVIRONMENT — scene backgrounds
  # ═══════════════════════════════════════════════════════════════════

  - block_id: ie_bg_hotel_lobby
    role: environment
    category: scene_build
    kind: single_state
    text: >-
      Modern hotel lobby behind the subject's current position.
      Polished floors, reception desk in background, warm ambient light.
    tags:
      intent: modify
      layer: background
      location: hotel_lobby
      setting_style: modern
    complexity_level: moderate

  - block_id: ie_bg_office
    role: environment
    category: scene_build
    kind: single_state
    text: >-
      Sleek corporate office behind the subject's current position.
      Glass walls, city skyline visible through windows.
    tags:
      intent: modify
      layer: background
      location: office
      setting_style: modern
    complexity_level: moderate

  - block_id: ie_bg_park_daylight
    role: environment
    category: scene_build
    kind: single_state
    text: >-
      Sunlit park behind the subject's current position.
      Trees, open grass, benches, natural daylight.
    tags:
      intent: modify
      layer: background
      location: park
      setting_style: natural
    complexity_level: moderate

  - block_id: ie_bg_nightclub
    role: environment
    category: scene_build
    kind: single_state
    text: >-
      Dimly lit nightclub interior behind the subject's current position.
      Ambient colored lighting, bar area visible, silhouettes of other patrons.
    tags:
      intent: modify
      layer: background
      location: nightclub
      setting_style: atmospheric
    complexity_level: moderate

  - block_id: ie_bg_undercity_corridor
    role: environment
    category: scene_build
    kind: single_state
    text: >-
      Narrow undercity bar corridor with rough stone walls close on both
      sides and low timber beams overhead. Depth recedes diagonally into
      shadow rather than forming a corner.
    tags:
      intent: modify
      layer: background
      location: undercity_corridor
      setting_style: medieval_dark
    complexity_level: moderate

  # ═══════════════════════════════════════════════════════════════════
  # PLACEMENT — scene-specific character descriptions
  # ═══════════════════════════════════════════════════════════════════

  - block_id: ie_char_porter_uniform
    role: placement
    category: character_desc
    kind: single_state
    default_intent: add
    text: >-
      He wears a hotel porter uniform and stands attentively.
      One hand rests lightly near the subject's side as if assisting
      or steadying something.
    tags:
      intent: add
      character_type: porter
      attire: uniform
    complexity_level: moderate

  - block_id: ie_char_distracted_man
    role: placement
    category: character_desc
    kind: single_state
    default_intent: add
    text: >-
      He is facing away from the subject, looking at his phone.
      Casual posture, visibly absorbed in the screen, unaware of
      his surroundings.
    tags:
      intent: add
      character_type: bystander
      posture: distracted
    complexity_level: moderate

  - block_id: ie_char_male_presence
    role: placement
    category: character_desc
    kind: single_state
    default_intent: add
    text: >-
      A male figure, partially visible. Angled toward the subject.
      Integrated into the scene lighting. Physical presence without
      narrative specificity.
    tags:
      intent: add
      character_type: male_presence
      posture: angled
    complexity_level: simple

  # ═══════════════════════════════════════════════════════════════════
  # ENVIRONMENT — Victorian study variants
  # ═══════════════════════════════════════════════════════════════════

  - block_id: ie_bg_victorian_study_01
    role: environment
    category: scene_build
    kind: single_state
    text: >-
      Place her inside a worn Victorian study. Heavy wooden desk cluttered
      with scattered case papers, maps, and handwritten notes. The desk
      aligns naturally with her current posture so she appears leaned
      slightly forward over it without changing her pose. Bookshelves line
      the walls, leather-bound volumes packed tight, a globe on a side table.
    tags:
      intent: modify
      layer: background
      location: victorian_study
      setting_style: period
      genre: detective
    complexity_level: complex

  - block_id: ie_bg_victorian_study_02
    role: environment
    category: scene_build
    kind: single_state
    text: >-
      Place her in a cluttered detective's study. Oak-panelled walls,
      a broad writing desk covered in open folders, magnifying glass,
      ink bottles, and a half-rolled map pinned at the corners. A worn
      armchair sits beside the desk. Curtains are drawn, sealing the
      room from the outside world.
    tags:
      intent: modify
      layer: background
      location: victorian_study
      setting_style: period
      genre: detective
    complexity_level: complex

  - block_id: ie_bg_victorian_study_03
    role: environment
    category: scene_build
    kind: single_state
    text: >-
      Place her in a small private study off a larger library. The desk
      is narrower, papers stacked in precarious columns, a brass desk
      lamp unlit, a coat draped over the chair behind her. The walls
      close in — the space is intimate by architecture, not choice.
    tags:
      intent: modify
      layer: background
      location: victorian_study
      setting_style: period
      genre: detective
    complexity_level: complex

  # ═══════════════════════════════════════════════════════════════════
  # LIGHTING — gas-lamp intimate variants
  # ═══════════════════════════════════════════════════════════════════

  - block_id: ie_key_gas_lamp_01
    role: lighting
    category: key
    kind: single_state
    text: >-
      Warm gas-lamp light pools softly across nearby surfaces and figures,
      creating a cozy enclosed atmosphere. Avoid sharp outlines or dramatic
      edge highlights. Illumination should feel close and atmospheric,
      falling off into deep amber shadow at the room edges.
    tags:
      intent: modify
      key_light: gas_lamp
      warmth: warm
      direction: desk_level
      contrast: low
    complexity_level: moderate

  - block_id: ie_key_gas_lamp_02
    role: lighting
    category: key
    kind: single_state
    text: >-
      Two gas-lamp sconces on the wall behind cast overlapping pools
      of amber light. The illumination wraps around figures from behind
      and above, creating warm rim-light on hair and shoulders while
      nearby surfaces glow from reflected light below.
    tags:
      intent: modify
      key_light: gas_lamp
      warmth: warm
      direction: behind_above
      contrast: medium
    complexity_level: moderate

  - block_id: ie_key_gas_lamp_03
    role: lighting
    category: key
    kind: single_state
    text: >-
      A single desk lamp with a green glass shade provides the only
      light source, casting a concentrated warm pool across the
      immediate work surface. Everything beyond arm's reach dissolves
      into soft darkness. Faces are lit from below and to the side.
    tags:
      intent: modify
      key_light: gas_lamp
      warmth: warm
      direction: desk_below
      contrast: high
    complexity_level: moderate

  - block_id: ie_fill_fireplace_glow
    role: lighting
    category: fill
    kind: single_state
    text: >-
      Low fireplace glow from across the room provides a faint secondary
      fill, adding warmth to the shadow side without competing with the
      primary light. Embers pulse slightly, casting barely perceptible
      movement into the stillness.
    tags:
      intent: modify
      fill_light: fireplace
      warmth: warm
      purpose: shadow_softening
      genre: detective
    complexity_level: simple

  # ═══════════════════════════════════════════════════════════════════
  # STYLE — wardrobe accents (subtle modification)
  # ═══════════════════════════════════════════════════════════════════

  - block_id: ie_style_victorian_accent_01
    role: style
    category: wardrobe
    kind: single_state
    text: >-
      Keep her clothing unchanged except for one subtle period accent
      integrated naturally into what she already wears — a thin cameo
      ribbon at the throat, or lace trim visible at a cuff. Maintain
      her exact silhouette. The accent should feel incidental, not
      costumed.
    tags:
      intent: modify
      aesthetic: victorian_accent
      genre: period
      modification: minimal
    complexity_level: simple

  - block_id: ie_style_victorian_accent_02
    role: style
    category: wardrobe
    kind: single_state
    text: >-
      Her clothing remains as-is with a single subtle addition — a small
      pocket watch on a chain tucked into a pocket or looped at the waist.
      The metal catches the gas-light. Her silhouette does not change.
    tags:
      intent: modify
      aesthetic: victorian_accent
      genre: period
      modification: minimal
    complexity_level: simple

  - block_id: ie_style_victorian_accent_03
    role: style
    category: wardrobe
    kind: single_state
    text: >-
      Clothing unchanged. A single dark velvet ribbon is tied loosely at
      her wrist or around her fingers, as if she absently picked it up
      from the desk. It reads as a found object, not a deliberate accessory.
    tags:
      intent: modify
      aesthetic: victorian_accent
      genre: period
      modification: minimal
    complexity_level: simple

  # ═══════════════════════════════════════════════════════════════════
  # ACTIVITY — what the subject is doing at the desk
  # ═══════════════════════════════════════════════════════════════════

  - block_id: ie_activity_sifting_papers_01
    role: action
    category: desk_activity
    kind: single_state
    text: >-
      She is idly sifting through his papers, lifting and shifting
      documents in a deliberately careless way, creating mild disorder
      across the desk. Pages slide, overlap, and drift off alignment.
    tags:
      intent: modify
      activity: paper_sifting
      mood: playful
      genre: detective
    complexity_level: moderate

  - block_id: ie_activity_sifting_papers_02
    role: action
    category: desk_activity
    kind: single_state
    text: >-
      She turns pages without reading them, fingertips dragging across
      handwritten lines, occasionally lifting a sheet to peer at the one
      beneath, then letting it fall back at a different angle than she
      found it.
    tags:
      intent: modify
      activity: paper_sifting
      mood: playful
      genre: detective
    complexity_level: moderate

  - block_id: ie_activity_sifting_papers_03
    role: action
    category: desk_activity
    kind: single_state
    text: >-
      She holds a folded map open with one hand, her other hand idly
      rearranging the notes beneath it, stacking and unstacking without
      system, the careful order of the desk slowly dismantling under
      her attention.
    tags:
      intent: modify
      activity: paper_sifting
      mood: playful
      genre: detective
    complexity_level: moderate

  - block_id: ie_activity_reading_idle_01
    role: action
    category: desk_activity
    kind: single_state
    text: >-
      She reads a single document held loosely in one hand, her posture
      relaxed, the other hand resting flat on the desk among the papers,
      as if she has all the time in the world and none of it is his.
    tags:
      intent: modify
      activity: reading
      mood: composed
      genre: detective
    complexity_level: simple

  # ═══════════════════════════════════════════════════════════════════
  # PLACEMENT — detective character interaction variants
  # ═══════════════════════════════════════════════════════════════════

  - block_id: ie_char_detective_behind_01
    role: placement
    category: character_desc
    kind: single_state
    default_intent: add
    text: >-
      An older detective stands extremely close behind her. He leans in,
      reaching past her slightly as if to rescue a particular document
      or stop her from misplacing evidence. One hand brushes lightly
      near hers as he tries to gather the papers she has disturbed.
      His expression mixes restrained exasperation with clear distraction.
    tags:
      intent: add
      character_type: detective
      posture: leaning_over
      proximity: intimate
      genre: detective
    complexity_level: complex

  - block_id: ie_char_detective_behind_02
    role: placement
    category: character_desc
    kind: single_state
    default_intent: add
    text: >-
      He stands directly behind her, one hand braced on the desk edge
      beside her hip, the other reaching across to retrieve a file she
      has just displaced. He is close enough that his waistcoat presses
      against her back when he leans forward. His jaw is set, his focus
      split between the papers and her proximity.
    tags:
      intent: add
      character_type: detective
      posture: braced_reaching
      proximity: intimate
      genre: detective
    complexity_level: complex

  - block_id: ie_char_detective_behind_03
    role: placement
    category: character_desc
    kind: single_state
    default_intent: add
    text: >-
      He hovers just behind and to her right, head angled down toward
      the desk, following her hands as they move through his papers.
      One arm extends past her shoulder to point at a specific document.
      He has not quite touched her but the distance is measured in
      inches, his irritation palpable in the tension of his outstretched hand.
    tags:
      intent: add
      character_type: detective
      posture: hovering_pointing
      proximity: near
      genre: detective
    complexity_level: complex

  - block_id: ie_char_detective_behind_04
    role: placement
    category: character_desc
    kind: single_state
    default_intent: add
    text: >-
      He leans past her from behind, both hands flat on the desk on
      either side of her, bracketing her position, his chin nearly
      above her shoulder as he reads what she is holding. He has
      forgotten his own indignation. His breathing is steady but
      deliberate.
    tags:
      intent: add
      character_type: detective
      posture: bracketing
      proximity: intimate
      genre: detective
    complexity_level: complex

  # ═══════════════════════════════════════════════════════════════════
  # MOOD — intimate disruption / tension
  # ═══════════════════════════════════════════════════════════════════

  - block_id: ie_mood_intimate_disruption_01
    role: style
    category: atmosphere
    kind: single_state
    text: >-
      Mood: intimate disruption. She unsettles both his case files and
      his composure. Playful chaos replacing clinical order. Their
      shadows fall softly into the room behind them.
    tags:
      intent: modify
      atmosphere: intimate_disruption
      tension: medium
      mood: warm
      genre: detective
    complexity_level: simple

  - block_id: ie_mood_intimate_disruption_02
    role: style
    category: atmosphere
    kind: single_state
    text: >-
      Mood: quiet provocation. The disorder she creates is not
      accidental — it is a conversational gambit conducted entirely
      through displaced paperwork. The room holds its breath between
      them. Their shadows merge on the wall behind the desk.
    tags:
      intent: modify
      atmosphere: intimate_disruption
      tension: medium
      mood: warm
      genre: detective
    complexity_level: moderate

  - block_id: ie_mood_intimate_disruption_03
    role: style
    category: atmosphere
    kind: single_state
    text: >-
      Mood: controlled tension. Every surface in the room suggests
      order — the shelved books, the labelled files — except the desk
      where she sits and the man standing too close behind her. The
      disruption is localised and deliberate. Warm light conspires
      with the tight framing to make the room feel smaller than it is.
    tags:
      intent: modify
      atmosphere: intimate_disruption
      tension: high
      mood: warm
      genre: detective
    complexity_level: moderate

  # ═══════════════════════════════════════════════════════════════════
  # POLICE PRECINCT — environment, wardrobe, placement, lighting, mood
  # ═══════════════════════════════════════════════════════════════════

  # ── environment — break room variants ───────────────────────────

  - block_id: ie_bg_police_break_room_01
    role: environment
    category: scene_build
    kind: single_state
    text: >-
      Transform the surrounding space into a modern police precinct break area.
      A brushed-steel coffee machine sits on a narrow counter, its position
      aligned naturally with her current hand placement. Institutional walls
      in muted grey-blue, scuffed linoleum, a corkboard with shift rosters
      pinned to it. The space is functional and confined — counters on both
      sides create a corridor-like compression that forces anyone present into
      close proximity. Desks and equipment visible through an open doorway
      remain understated so she stays the absolute visual focus.
    tags:
      intent: modify
      layer: background
      location: police_break_room
      setting_style: modern_institutional
      genre: police
    complexity_level: complex

  - block_id: ie_bg_police_break_room_02
    role: environment
    category: scene_build
    kind: single_state
    text: >-
      Place her in the narrow kitchenette alcove of a precinct station.
      A commercial coffee maker sits on the counter at the height of her
      hands. Overhead strip lighting, pale institutional tile, a small
      fridge humming in the corner. The alcove is barely wide enough for
      two people — anyone approaching the machine must press past whoever
      is already standing there. Through a glass-panelled door at the far
      end, a hallway stretches toward the lobby.
    tags:
      intent: modify
      layer: background
      location: police_break_room
      setting_style: modern_institutional
      genre: police
    complexity_level: complex

  - block_id: ie_bg_police_break_room_03
    role: environment
    category: scene_build
    kind: single_state
    text: >-
      A utilitarian precinct break room forms around her. Coffee station
      built into the wall, drip tray, stack of ceramic mugs. Filing cabinets
      line one side, a wall-mounted TV plays muted news footage. The room
      is small enough that every movement registers — brushing past someone
      is unavoidable. A reinforced glass partition separates the break area
      from the public-facing corridor beyond.
    tags:
      intent: modify
      layer: background
      location: police_break_room
      setting_style: modern_institutional
      genre: police
    complexity_level: complex

  # ── wardrobe — police uniform rework ────────────────────────────

  - block_id: ie_style_police_uniform_01
    role: style
    category: wardrobe
    kind: single_state
    text: >-
      Refine her existing outfit into a sleek police uniform interpretation
      while preserving the original garment structure and coverage area.
      Deep navy tone, smooth fitted tailoring that traces every line and
      curve of her natural figure with deliberate precision. The fabric
      sits flush against her waist, hips, and thighs, following the body
      closely enough that each subtle contour reads clearly through the
      material. Structured waist with a slim duty belt riding low on her
      hips. Precise seams run along the sides, drawing the eye down her
      silhouette. A small polished badge catches the light at her chest.
      Where her pose creates natural tension — a bent arm, a shifted hip —
      the fabric pulls slightly taut, revealing the shape beneath with
      quiet emphasis. The uniform reads as deliberately fitted, form over
      function, every panel cut to flatter.
    tags:
      intent: modify
      aesthetic: police_uniform
      genre: police
      palette: dark_navy
      texture: smooth_wool
      sensuality: elevated
    complexity_level: complex

  - block_id: ie_style_police_uniform_02
    role: style
    category: wardrobe
    kind: single_state
    text: >-
      Adapt her clothing into a modern police duty uniform that clings to
      her frame as though tailored to a second-skin fit. Matte navy fabric
      with a faint sheen where it stretches over curves. The shirt buttons
      follow the centerline precisely, the material drawing smooth between
      them. Tailored trousers sit high at the waist and follow the hip and
      thigh line without a single crease of excess fabric. A narrow belt
      with a polished buckle cinches the waist, accentuating the ratio above
      and below. Epaulettes at the shoulders, a single breast pocket, collar
      pressed sharp. The overall effect is regulation on the surface, but
      every seam and dart exists to sculpt and define her shape beneath.
    tags:
      intent: modify
      aesthetic: police_uniform
      genre: police
      palette: dark_navy
      texture: matte_stretch
      sensuality: elevated
    complexity_level: complex

  - block_id: ie_style_police_uniform_03
    role: style
    category: wardrobe
    kind: single_state
    text: >-
      Rework her outfit into a fitted precinct uniform with deliberate
      couture sharpness. Dark navy, almost black. The blouse is tucked
      tight, its fabric smooth and uninterrupted across her torso, the
      bottom two buttons left undone where it meets the waistband. Slim
      tactical trousers hug her hips and upper thighs before tapering.
      A thin leather duty belt sits on the hip bones, its weight pulling
      the waistband fractionally lower. Cuffs folded once at the forearm,
      exposing bare wrists. The silhouette is unmistakably uniform yet
      reads like something chosen rather than issued — every contour
      emphasized by the precision of the cut.
    tags:
      intent: modify
      aesthetic: police_uniform
      genre: police
      palette: dark_navy
      texture: smooth_tactical
      sensuality: elevated
    complexity_level: complex

  # ── wardrobe — su_lt-ry uniform variants (genre-generic) ────────
  #
  # These blocks do NOT name a specific genre. They reference
  # "the scene's implied dress code / uniform" and let the model
  # infer the genre from the environment and mood blocks already
  # present in the assembled prompt.

  - block_id: ie_style_sultry_uniform_01
    role: style
    category: wardrobe
    kind: single_state
    text: >-
      Reinterpret her outfit as a su_lt-ry, daring variant of whatever attire
      the surrounding scene implies. Keep the genre's palette and key signifiers
      — badges, buckles, insignia, period details — but shorten hemlines well
      above mid-thigh, bare the midriff or deepen the neckline, and tighten
      every panel until fabric maps each curve without ambiguity. The outfit
      should read as a deliberate fantasy version of the scene's dress code,
      not as regulation wear. Prioritise skin ratio and silhouette over
      authenticity.
    tags:
      intent: modify
      variant: sultry
      sensuality: high
    complexity_level: complex

  - block_id: ie_style_sultry_uniform_02
    role: style
    category: wardrobe
    kind: single_state
    text: >-
      Transform her clothing into a loosened, provo_ca-tive reading of the
      scene's implied uniform or dress code. Buttons undone to mid-sternum,
      shirt untucked or tied at the waist exposing bare skin between hem and
      waistband. Replace full-length bottoms with a fitted mini-skirt or
      short shorts in the same palette. Retain just enough genre markers —
      insignia, period fabric, rank hardware — for recognition, but strip
      coverage down until the outfit is barely functional. The look should
      feel like she chose to wear it this way.
    tags:
      intent: modify
      variant: sultry
      sensuality: high
    complexity_level: complex

  - block_id: ie_style_sultry_uniform_03
    role: style
    category: wardrobe
    kind: single_state
    text: >-
      Replace her outfit with a single-piece body-con garment that inherits
      the colour palette and texture vocabulary of whatever attire the scene's
      setting would normally dictate. The piece stops at upper thigh, fits
      without a wrinkle, and reveals shoulders, arms, and legs. Clip or pin
      one small genre-appropriate emblem at the neckline — a badge, brooch,
      crest, or insignia — as the sole reference to the original uniform.
      The rest is shape, skin, and fabric tension.
    tags:
      intent: modify
      variant: sultry
      sensuality: high
    complexity_level: complex

