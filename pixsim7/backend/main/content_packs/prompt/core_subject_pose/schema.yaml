version: 1.0.0
package_name: core_subject_pose
defaults:
  is_public: true
  source: system
blocks:
  - id: pose
    block_schema:
      id_prefix: core.subject.pose
      category: character_pose
      capabilities:
        - subject.pose
      text_template: 'Pose token: {variant}.'
      tags:
        modifier_family: subject_pose
        modality_support: both
        temporal: neutral
      op:
        op_id: subject.pose.set
        signature_id: subject.pose.v1
        modalities:
          - both
        refs:
          - key: subject
            capability: subject
            required: false
          - key: target
            capability: target
            required: false
        params:
          - key: pose
            tag_key: pose
            type: enum
            enum:
              - standing
              - seated
              - kneeling
              - leaning
              - crouching
              - lying
            default: standing
          - key: hands
            tag_key: hands
            type: enum
            enum:
              - neutral
              - at_sides
              - behind_back
              - on_hips
              - in_pockets
              - holding_object
            default: neutral
          - key: gaze
            tag_key: gaze
            type: enum
            enum:
              - forward
              - down
              - up
              - left
              - right
              - at_target
              - away
            default: forward
          - key: target_ref
            required: false
            type: ref
            ref_capability: target
        default_args:
          pose: standing
          hands: neutral
          gaze: forward
      variants:
        - key: standing_neutral
          tags:
            gaze: forward
          op_args:
            pose: standing
            hands: at_sides
            gaze: forward
        - key: seated_relaxed
          tags:
            gaze: down
          op_args:
            pose: seated
            hands: neutral
            gaze: down
        - key: leaning_forward
          tags:
            gaze: at_target
          op_args:
            pose: leaning
            hands: on_hips
            gaze: at_target
        - key: crouched_ready
          tags:
            gaze: forward
          op_args:
            pose: crouching
            hands: neutral
            gaze: forward
        - key: kneeling_reach
          tags:
            gaze: at_target
          op_args:
            pose: kneeling
            hands: holding_object
            gaze: at_target
