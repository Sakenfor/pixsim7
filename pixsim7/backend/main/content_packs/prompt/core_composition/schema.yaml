version: 1.0.0
package_name: core_composition
defaults:
  is_public: true
  source: system
blocks:
  - id: composition
    block_schema:
      id_prefix: core.camera.composition
      category: composition
      capabilities:
        - camera.composition
      text_template: 'Composition token: {variant}.'
      tags:
        modifier_family: composition
        modality_support: both
        temporal: neutral
      op:
        op_id: camera.composition.set
        signature_id: camera.composition.v1
        modalities:
          - image
          - video
        refs:
          - key: subject
            capability: subject
            required: false
        params:
          - key: framing
            tag_key: composition_framing
            type: enum
            enum:
              - centered
              - rule_of_thirds
              - symmetrical
              - off_center
              - leading_lines
              - negative_space
            default: centered
        default_args:
          framing: centered
      variants:
        - key: centered
          tags:
            composition_synonyms:
              - centered composition
              - dead center
              - central framing
              - symmetrically centered
          op_args:
            framing: centered
        - key: rule_of_thirds
          tags:
            composition_synonyms:
              - rule of thirds
              - thirds grid
              - off-center thirds placement
          op_args:
            framing: rule_of_thirds
        - key: symmetrical
          tags:
            composition_synonyms:
              - symmetry
              - symmetric
              - mirror symmetry
              - balanced framing
          op_args:
            framing: symmetrical
        - key: off_center
          tags:
            composition_synonyms:
              - off-center
              - asymmetric
              - asymmetrical
              - decentered framing
          op_args:
            framing: off_center
        - key: leading_lines
          tags:
            composition_synonyms:
              - leading lines
              - converging lines
              - diagonal guiding lines
          op_args:
            framing: leading_lines
        - key: negative_space
          tags:
            composition_synonyms:
              - negative space
              - empty space framing
              - minimalist negative space
          op_args:
            framing: negative_space
