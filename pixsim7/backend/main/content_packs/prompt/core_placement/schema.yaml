version: 1.0.0
package_name: core_placement
defaults:
  is_public: true
  source: system
block_schema:
  id_prefix: core.placement.anchor
  category: location
  capabilities:
    - scene.anchor
  text_template: 'Placement token: {variant}.'
  tags:
    modifier_family: placement
    modality_support: both
    temporal: neutral
  op:
    op_id: scene.anchor.place
    modalities:
      - both
    refs:
      - key: subject
        capability: subject
        required: false
      - key: anchor
        capability: anchor
        required: false
      - key: target
        capability: target
        required: false
    params:
      - key: relation
        type: enum
        default: near
        enum:
          - near
          - left_of
          - right_of
          - in_front_of
          - behind
          - above
          - below
      - key: distance
        type: enum
        default: medium
        enum:
          - contact
          - near
          - medium
          - far
      - key: orientation
        type: enum
        default: front
        enum:
          - front
          - profile_left
          - profile_right
          - back
      - key: anchor_ref
        type: ref
        required: false
        ref_capability: anchor
      - key: target_ref
        type: ref
        required: false
        ref_capability: target
    default_args:
      relation: near
      distance: medium
      orientation: front
  variants:
    - key: near
      tags:
        placement_relation: near
        placement_distance: near
      op_args:
        relation: near
        distance: near
    - key: left_of
      tags:
        placement_relation: left_of
        placement_distance: medium
      op_args:
        relation: left_of
        distance: medium
    - key: right_of
      tags:
        placement_relation: right_of
        placement_distance: medium
      op_args:
        relation: right_of
        distance: medium
    - key: in_front_of
      tags:
        placement_relation: in_front_of
        placement_distance: medium
      op_args:
        relation: in_front_of
        distance: medium
    - key: behind
      tags:
        placement_relation: behind
        placement_distance: medium
      op_args:
        relation: behind
        distance: medium
    - key: above
      tags:
        placement_relation: above
        placement_distance: far
      op_args:
        relation: above
        distance: far
    - key: below
      tags:
        placement_relation: below
        placement_distance: far
      op_args:
        relation: below
        distance: far
