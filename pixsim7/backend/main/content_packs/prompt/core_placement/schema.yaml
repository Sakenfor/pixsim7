version: 1.0.0
package_name: core_placement
defaults:
  is_public: true
  source: system
blocks:
  - id: anchor
    block_schema:
      id_prefix: core.placement.anchor
      category: location
      capabilities:
        - scene.anchor
      text_template: 'Placement token: {variant}.'
      tags:
        modifier_family: placement
        modality_support: both
        temporal: neutral
        placement_context_synonyms:
          - positioned
          - placed
          - standing
          - located
          - sits
          - sitting
      op:
        op_id: scene.anchor.place
        modalities:
          - both
        refs:
          - key: subject
            capability: subject
            required: false
          - key: anchor
            capability: anchor
            required: false
          - key: target
            capability: target
            required: false
        params:
          - key: relation
            type: enum
            enum:
              - near
              - left_of
              - right_of
              - in_front_of
              - behind
              - above
              - below
            default: near
          - key: distance
            type: enum
            enum:
              - contact
              - near
              - medium
              - far
            default: medium
          - key: orientation
            type: enum
            enum:
              - front
              - profile_left
              - profile_right
              - back
            default: front
          - key: anchor_ref
            required: false
            type: ref
            ref_capability: anchor
          - key: target_ref
            required: false
            type: ref
            ref_capability: target
        default_args:
          relation: near
          distance: medium
          orientation: front
      variants:
        - key: near
          tags:
            placement_relation: near
            placement_distance: near
            placement_synonyms:
              - nearby
              - close
              - close to
              - next to
              - beside
          op_args:
            relation: near
            distance: near
        - key: left_of
          tags:
            placement_relation: left_of
            placement_distance: medium
            placement_synonyms:
              - left of
              - to the left
              - left side
              - left side of frame
          op_args:
            relation: left_of
            distance: medium
        - key: right_of
          tags:
            placement_relation: right_of
            placement_distance: medium
            placement_synonyms:
              - right of
              - to the right
              - right side
              - right side of frame
          op_args:
            relation: right_of
            distance: medium
        - key: in_front_of
          tags:
            placement_relation: in_front_of
            placement_distance: medium
            placement_synonyms:
              - in front of
              - in front
              - ahead of
              - before
          op_args:
            relation: in_front_of
            distance: medium
        - key: behind
          tags:
            placement_relation: behind
            placement_distance: medium
            placement_synonyms:
              - behind
              - in back of
              - at the back
              - rear of
          op_args:
            relation: behind
            distance: medium
        - key: above
          tags:
            placement_relation: above
            placement_distance: far
            placement_synonyms:
              - above
              - over
              - overhead
              - higher than
              - elevated
          op_args:
            relation: above
            distance: far
        - key: below
          tags:
            placement_relation: below
            placement_distance: far
            placement_synonyms:
              - below
              - under
              - beneath
              - underneath
              - lower than
          op_args:
            relation: below
            distance: far
