version: 1.0.0
package_name: core_subject_repro_organ
defaults:
  is_public: true
  source: system
blocks:
  - id: repro_organ
    block_schema:
      id_prefix: core.subject.repro_organ
      category: character_anatomy
      capabilities:
        - subject.repro_organ
      text_template: 'Reproductive organ token: {variant}.'
      tags:
        modifier_family: repro_organ
        modality_support: both
        temporal: neutral
      op:
        op_id: subject.repro_organ.set
        signature_id: subject.repro_organ.v1
        modalities:
          - both
        refs:
          - key: subject
            capability: subject
            required: false
        params:
          - key: organ_class
            type: enum
            default: neutral
            enum:
              - insertive
              - receptive
              - neutral
              - cloacal
              - none
            tag_key: organ_class
          - key: state
            type: enum
            default: neutral
            enum:
              - flaccid
              - slightly_erect
              - fully_erect
              - receptive
              - post_use
              - neutral
            tag_key: organ_state
          - key: visibility
            type: enum
            default: visible
            enum:
              - visible
              - clothed
              - obscured
              - implied
            tag_key: organ_visibility
          - key: presentation
            type: enum
            default: forward
            enum:
              - forward
              - dropped
              - sheathed
              - tucked
              - exposed
              - concealed
            tag_key: organ_presentation
          - key: size
            type: enum
            default: unspecified
            enum:
              - small
              - medium
              - large
              - very_large
              - unspecified
            tag_key: organ_size
          - key: surface
            type: enum
            default: natural
            enum:
              - smooth
              - wrinkled
              - textured
              - ridged
              - glossy
              - matte
              - natural
            tag_key: organ_surface
          - key: subject_ref
            type: ref
            required: false
            ref_capability: subject
        default_args:
          organ_class: neutral
          state: neutral
          visibility: visible
          presentation: forward
          size: unspecified
          surface: natural
      variants:
        - key: insertive_flaccid_visible
          op_args:
            organ_class: insertive
            state: flaccid
            visibility: visible
            presentation: dropped
            size: unspecified
            surface: natural
        - key: insertive_slightly_erect_small_forward
          op_args:
            organ_class: insertive
            state: slightly_erect
            visibility: visible
            presentation: forward
            size: small
            surface: wrinkled
        - key: insertive_slightly_erect_medium_forward
          op_args:
            organ_class: insertive
            state: slightly_erect
            visibility: visible
            presentation: forward
            size: medium
            surface: natural
        - key: insertive_fully_erect_medium_forward
          op_args:
            organ_class: insertive
            state: fully_erect
            visibility: visible
            presentation: forward
            size: medium
            surface: smooth
        - key: insertive_fully_erect_large_forward
          op_args:
            organ_class: insertive
            state: fully_erect
            visibility: visible
            presentation: forward
            size: large
            surface: smooth
        - key: insertive_sheathed
          op_args:
            organ_class: insertive
            state: neutral
            visibility: visible
            presentation: sheathed
            size: unspecified
            surface: natural
        - key: insertive_clothed_implied
          op_args:
            organ_class: insertive
            state: neutral
            visibility: clothed
            presentation: concealed
            size: unspecified
            surface: natural
        - key: receptive_neutral_visible
          op_args:
            organ_class: receptive
            state: neutral
            visibility: visible
            presentation: exposed
            size: unspecified
            surface: smooth
        - key: receptive_aroused_visible
          op_args:
            organ_class: receptive
            state: receptive
            visibility: visible
            presentation: exposed
            size: unspecified
            surface: glossy
        - key: receptive_clothed_implied
          op_args:
            organ_class: receptive
            state: neutral
            visibility: clothed
            presentation: concealed
            size: unspecified
            surface: natural
        - key: cloacal_visible
          op_args:
            organ_class: cloacal
            state: neutral
            visibility: visible
            presentation: exposed
            size: unspecified
            surface: smooth
        - key: neutral_concealed
          op_args:
            organ_class: neutral
            state: neutral
            visibility: obscured
            presentation: concealed
            size: unspecified
            surface: natural
        - key: none
          op_args:
            organ_class: none
            state: neutral
            visibility: obscured
            presentation: concealed
            size: unspecified
            surface: natural
