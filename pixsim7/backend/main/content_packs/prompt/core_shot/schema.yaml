version: 1.0.0
package_name: core_shot
defaults:
  is_public: true
  source: system
blocks:
  - id: shot
    block_schema:
      id_prefix: core.camera.shot
      category: camera
      capabilities:
        - camera.shot
      text_template: 'Shot token: {variant}.'
      tags:
        modifier_family: shot
        modality_support: both
        temporal: neutral
      op:
        op_id: camera.shot.set
        modalities:
          - both
        refs:
          - key: subject
            capability: subject
            required: false
          - key: target
            capability: target
            required: false
        params:
          - key: shot_size
            type: enum
            enum:
              - extreme_wide
              - wide
              - medium
              - close_up
              - extreme_close_up
            default: medium
          - key: subject_count
            type: enum
            enum:
              - single
              - pair
              - group
            default: single
          - key: target_ref
            required: false
            type: ref
            ref_capability: target
        default_args:
          shot_size: medium
          subject_count: single
      variants:
        - key: extreme_wide_establishing
          tags:
            shot_size: extreme_wide
            subject_count: group
          op_args:
            shot_size: extreme_wide
            subject_count: group
        - key: wide_single
          tags:
            shot_size: wide
            subject_count: single
          op_args:
            shot_size: wide
            subject_count: single
        - key: medium_single
          tags:
            shot_size: medium
            subject_count: single
          op_args:
            shot_size: medium
            subject_count: single
        - key: close_up_single
          tags:
            shot_size: close_up
            subject_count: single
          op_args:
            shot_size: close_up
            subject_count: single
        - key: extreme_close_up_detail
          tags:
            shot_size: extreme_close_up
            subject_count: single
          op_args:
            shot_size: extreme_close_up
            subject_count: single
