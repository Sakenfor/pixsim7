      id_prefix: latin.voice.pattern
      mode: surface
      category: latin_enhancer
      capabilities:
        - latin.enhancer
        - voice.pattern
      text_template: 'Latin enhancer: {variant}.'
      tags:
        modifier_family: latin_enhancer
        modality_support: both
        temporal: dynamic
        domain:
          - voice
          - sound
          - pattern
      variants:
