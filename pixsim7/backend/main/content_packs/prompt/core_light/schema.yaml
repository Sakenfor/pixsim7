version: 1.0.0
package_name: core_light
defaults:
  is_public: true
  source: system
block_schema:
  id_prefix: core.light.state
  category: light
  capabilities:
    - light.state
  text_template: 'Lighting token: {variant}.'
  tags:
    modifier_family: light
    modality_support: both
    temporal: neutral
  op:
    op_id: light.state.set
    modalities:
      - both
    refs:
      - key: subject
        capability: subject
        required: false
    params:
      - key: key_light
        type: enum
        default: diffuse
        enum:
          - diffuse
          - soft
          - hard
          - rim
          - backlit
      - key: intensity
        type: enum
        default: medium
        enum:
          - low
          - medium
          - high
      - key: temperature
        type: enum
        default: neutral
        enum:
          - warm
          - neutral
          - cool
          - mixed
      - key: contrast
        type: enum
        default: medium
        enum:
          - low
          - medium
          - high
    default_args:
      key_light: diffuse
      intensity: medium
      temperature: neutral
      contrast: medium
  variants:
    - key: soft_warm
      tags:
        light_key: soft
        light_temperature: warm
        light_intensity: medium
      op_args:
        key_light: soft
        temperature: warm
        intensity: medium
        contrast: low
    - key: hard_cool
      tags:
        light_key: hard
        light_temperature: cool
        light_intensity: high
      op_args:
        key_light: hard
        temperature: cool
        intensity: high
        contrast: high
    - key: diffuse_neutral
      tags:
        light_key: diffuse
        light_temperature: neutral
        light_intensity: medium
      op_args:
        key_light: diffuse
        temperature: neutral
        intensity: medium
        contrast: medium
    - key: rim_dramatic
      tags:
        light_key: rim
        light_temperature: cool
        light_intensity: high
      op_args:
        key_light: rim
        temperature: cool
        intensity: high
        contrast: high
    - key: backlit_silhouette
      tags:
        light_key: backlit
        light_temperature: mixed
        light_intensity: high
      op_args:
        key_light: backlit
        temperature: mixed
        intensity: high
        contrast: high
