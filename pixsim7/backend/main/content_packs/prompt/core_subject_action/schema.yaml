version: 1.0.0
package_name: core_subject_action
defaults:
  is_public: true
  source: system
groups:
  - id: react
    title: React
  - id: gesture
    title: Gesture
  - id: reach
    title: Reach
  - id: contact
    title: Contact
  - id: release
    title: Release
blocks:
  - id: react
    group: react
    block_schema:
      id_prefix: core.subject.action.react
      category: character_pose
      capabilities:
        - subject.action
        - subject.action.react
      text_template: 'React token: {variant}.'
      tags:
        modifier_family: subject_action_react
        modality_support: both
        temporal: dynamic
      op:
        op_id: subject.action.perform
        signature_id: subject.action.v1
        modalities:
          - both
        refs:
          - key: subject
            capability: subject
            required: false
          - key: target
            capability: target
            required: false
        params:
          - key: action_verb
            type: enum
            enum:
              - reach
              - grasp
              - pull
              - push
              - lift
              - lower
              - strike
              - embrace
              - release
              - gesture
              - react
              - turn_to
            default: gesture
            tag_key: action_verb
          - key: target_involvement
            type: enum
            enum:
              - none
              - indirect
              - direct
            default: none
            tag_key: target_involvement
          - key: body_region
            type: enum
            enum:
              - arms
              - upper_body
              - full_body
              - hands
              - head
            default: upper_body
            tag_key: body_region
          - key: target_ref
            required: false
            type: ref
            ref_capability: target
        default_args:
          action_verb: react
          target_involvement: none
          body_region: upper_body
      variants:
        - key: react_strong
          tags:
            action_synonyms:
              - flinches
              - startled
              - recoils
              - sharp reaction
              - steps back
          op_args:
            action_verb: react
            target_involvement: none
            body_region: full_body
        - key: react_subtle
          tags:
            action_synonyms:
              - subtle reaction
              - slight flinch
              - faint response
              - small recoil
          op_args:
            action_verb: react
            target_involvement: none
            body_region: upper_body
        - key: react_to_target
          tags:
            action_synonyms:
              - reacts to
              - responds to
              - recoils from
              - startled by
              - reacts toward
          op_args:
            action_verb: react
            target_involvement: indirect
            body_region: upper_body
