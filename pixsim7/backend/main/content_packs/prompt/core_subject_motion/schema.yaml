version: 1.0.0
package_name: core_subject_motion
defaults:
  is_public: true
  source: system
block_schema:
  id_prefix: core.subject.motion
  category: character_pose
  capabilities:
    - subject.move
  text_template: 'Subject motion token: {variant}.'
  tags:
    modifier_family: subject_motion
    modality_support: video
    temporal: dynamic
  op:
    op_id: subject.move.apply
    modalities:
      - video
    refs:
      - key: subject
        capability: subject
        required: false
      - key: target
        capability: target
        required: false
    params:
      - key: direction
        type: enum
        default: forward
        enum:
          - in
          - out
          - left
          - right
          - up
          - down
          - forward
          - backward
          - around
      - key: speed
        type: enum
        default: normal
        enum:
          - slow
          - normal
          - fast
      - key: gait
        type: enum
        default: walk
        enum:
          - step
          - walk
          - run
          - drift
          - turn
      - key: target_ref
        type: ref
        required: false
        ref_capability: target
    default_args:
      direction: forward
      speed: normal
      gait: walk
  variants:
    - key: move_forward
      tags:
        motion_direction: forward
        motion_speed: normal
      op_args:
        direction: forward
        speed: normal
        gait: walk
    - key: move_left
      tags:
        motion_direction: left
        motion_speed: slow
      op_args:
        direction: left
        speed: slow
        gait: step
    - key: move_right
      tags:
        motion_direction: right
        motion_speed: slow
      op_args:
        direction: right
        speed: slow
        gait: step
    - key: turn_around
      tags:
        motion_direction: around
        motion_speed: normal
      op_args:
        direction: around
        speed: normal
        gait: turn
