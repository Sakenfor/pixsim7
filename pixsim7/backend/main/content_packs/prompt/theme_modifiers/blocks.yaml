version: "1.0.0"
package_name: theme_modifiers

defaults:
  source_type: library
  curation_status: curated
  is_public: true
  style: photorealistic
  created_by: content_pack
  default_intent: modify

blocks:

  # =====================================================================
  # Theme Modifiers: abstract, reusable "dial" blocks
  #
  # Design:
  # - These blocks should be low-specificity and non-explicit.
  # - They should not reference sub-genres (desert/forest/etc.).
  # - Templates combine a concrete theme wardrobe block (in their own pack)
  #   with one of these modifiers to steer fit/daring without duplication.
  # =====================================================================

  - block_id: ie_mod_wardrobe_allure_preserve_01
    role: style
    category: wardrobe_modifier
    kind: single_state
    text: >-
      Keep the outfit's fit and overall silhouette aligned with the source image.
      Do not introduce bolder tailoring or more daring cut lines; prioritize continuity.
    tags:
      intent: modify
      modifier_family: allure
      modifier_target: wardrobe
      allure_level: preserve
      modesty_level: balanced
      silhouette: preserve
    complexity_level: simple

  - block_id: ie_mod_wardrobe_allure_subtle_01
    role: style
    category: wardrobe_modifier
    kind: single_state
    text: >-
      Steer the outfit toward a slightly more confident, fashion-forward fit while staying tasteful.
      Prefer subtle tailoring, cleaner wrap geometry, and intentional layering without changing garment length.
    tags:
      intent: modify
      modifier_family: allure
      modifier_target: wardrobe
      allure_level: subtle
      modesty_level: balanced
      silhouette: fitted
    complexity_level: moderate

  - block_id: ie_mod_wardrobe_allure_medium_01
    role: style
    category: wardrobe_modifier
    kind: single_state
    text: >-
      Steer the outfit toward a confident, fashion-forward silhouette while staying non-explicit.
      Prefer a more fitted structure with coherent styling lines, wrapped waist accents, and a deliberate, modern finish.
    tags:
      intent: modify
      modifier_family: allure
      modifier_target: wardrobe
      allure_level: medium
      modesty_level: balanced
      silhouette: accentuated
    complexity_level: complex

  - block_id: ie_mod_wardrobe_allure_high_01
    role: style
    category: wardrobe_modifier
    kind: single_state
    text: >-
      Steer the outfit toward a bold, daring, fashion-forward silhouette while remaining tasteful and non-explicit.
      Prefer stronger fitted structure, more daring but appropriate cut lines, and confident styling emphasis.
    tags:
      intent: modify
      modifier_family: allure
      modifier_target: wardrobe
      allure_level: high
      modesty_level: daring
      silhouette: accentuated
    complexity_level: complex
