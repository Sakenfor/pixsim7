version: 1.0.0
package_name: core_focus
defaults:
  is_public: true
  source: system
blocks:
  - id: focus
    block_schema:
      id_prefix: core.camera.focus
      category: camera
      capabilities:
        - camera.focus
      text_template: 'Focus token: {variant}.'
      tags:
        modifier_family: focus
        modality_support: both
        temporal: neutral
      op:
        op_id: camera.focus.set
        signature_id: camera.focus.v1
        modalities:
          - both
        refs:
          - key: subject
            capability: subject
            required: false
          - key: target
            capability: target
            required: false
        params:
          - key: focus_target
            type: enum
            enum:
              - subject
              - target
              - background
            default: subject
          - key: depth_of_field
            type: enum
            enum:
              - shallow
              - medium
              - deep
            default: medium
          - key: rack
            tag_key: rack_focus
            type: boolean
            default: false
          - key: focal_length
            tag_key: focal_length
            type: enum
            enum:
              - normal
              - telephoto
              - macro
              - fisheye
              - anamorphic
            default: normal
          - key: target_ref
            required: false
            type: ref
            ref_capability: target
        default_args:
          focus_target: subject
          depth_of_field: medium
          rack: false
          focal_length: normal
      variants:
        - key: subject_shallow
          op_args:
            focus_target: subject
            depth_of_field: shallow
            rack: false
        - key: subject_deep
          op_args:
            focus_target: subject
            depth_of_field: deep
            rack: false
        - key: target_shallow
          op_args:
            focus_target: target
            depth_of_field: shallow
            rack: false
        - key: target_deep
          op_args:
            focus_target: target
            depth_of_field: deep
            rack: false
        - key: background_deep
          op_args:
            focus_target: background
            depth_of_field: deep
            rack: false
        - key: rack_subject_to_target
          op_args:
            focus_target: target
            depth_of_field: shallow
            rack: true
        - key: telephoto
          tags:
            focal_synonyms:
              - telephoto lens
              - long lens
              - compressed perspective
              - tele lens
          op_args:
            focus_target: subject
            depth_of_field: shallow
            rack: false
            focal_length: telephoto
        - key: macro
          tags:
            focal_synonyms:
              - macro lens
              - macro photography
              - extreme magnification
              - tiny detail
          op_args:
            focus_target: subject
            depth_of_field: shallow
            rack: false
            focal_length: macro
        - key: fisheye
          tags:
            focal_synonyms:
              - fisheye lens
              - fish-eye
              - spherical distortion
              - curved distortion
          op_args:
            focus_target: subject
            depth_of_field: deep
            rack: false
            focal_length: fisheye
        - key: anamorphic
          tags:
            focal_synonyms:
              - anamorphic lens
              - cinemascope
              - horizontal lens flare
              - oval bokeh
          op_args:
            focus_target: subject
            depth_of_field: shallow
            rack: false
            focal_length: anamorphic
