version: 1.0.0
package_name: core_focus
defaults:
  is_public: true
  source: system
blocks:
  - id: focus
    block_schema:
      id_prefix: core.camera.focus
      category: camera
      capabilities:
        - camera.focus
      text_template: 'Focus token: {variant}.'
      tags:
        modifier_family: focus
        modality_support: both
        temporal: neutral
      op:
        op_id: camera.focus.set
        signature_id: camera.focus.v1
        modalities:
          - both
        refs:
          - key: subject
            capability: subject
            required: false
          - key: target
            capability: target
            required: false
        params:
          - key: focus_target
            type: enum
            default: subject
            enum:
              - subject
              - target
              - background
          - key: depth_of_field
            type: enum
            default: medium
            enum:
              - shallow
              - medium
              - deep
          - key: rack
            type: boolean
            default: false
            tag_key: rack_focus
          - key: target_ref
            type: ref
            required: false
            ref_capability: target
        default_args:
          focus_target: subject
          depth_of_field: medium
          rack: false
      variants:
        - key: subject_shallow
          op_args:
            focus_target: subject
            depth_of_field: shallow
            rack: false
        - key: subject_deep
          op_args:
            focus_target: subject
            depth_of_field: deep
            rack: false
        - key: target_shallow
          op_args:
            focus_target: target
            depth_of_field: shallow
            rack: false
        - key: target_deep
          op_args:
            focus_target: target
            depth_of_field: deep
            rack: false
        - key: background_deep
          op_args:
            focus_target: background
            depth_of_field: deep
            rack: false
        - key: rack_subject_to_target
          op_args:
            focus_target: target
            depth_of_field: shallow
            rack: true
