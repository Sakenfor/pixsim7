version: "1.0.0"
package_name: shared

defaults:
  source_type: library
  curation_status: curated
  is_public: true
  style: photorealistic
  created_by: content_pack
  default_intent: modify

blocks:

  # ═══════════════════════════════════════════════════════════════════
  # SUBJECT — preservation locks, one concern each
  # ═══════════════════════════════════════════════════════════════════

  - block_id: ie_lock_identity
    role: subject
    category: identity_lock
    kind: single_state
    default_intent: preserve
    text: >-
      Preserve facial identity, body proportions, curves, and skin detail
      exactly as in the source image. No reinterpretation of features.
    tags:
      intent: preserve
      layer: foreground
      lock: identity
    complexity_level: simple

  - block_id: ie_lock_framing
    role: subject
    category: framing_lock
    kind: single_state
    default_intent: preserve
    text: >-
      Maintain the subject's framing scale, position in frame, and
      brightness/tonal range exactly as in the source image.
    tags:
      intent: preserve
      layer: foreground
      lock: framing
    complexity_level: simple

  # ── graduated pose lock — minimal rigidity ─────────────────────────

  - block_id: pl_minimal_skeletal
    role: subject
    category: pose_lock
    kind: single_state
    default_intent: preserve
    text: >-
      Preserve the posture class and facing direction from the source —
      standing, sitting, or reclining orientation stays the same. All
      joint angles, limb positions, and extremities are free to change.
      Only the broad postural category is retained.
    tags:
      intent: preserve
      layer: foreground
      lock: pose
      rigidity: minimal
      approach: skeletal
      scope: full_body
      mode: any
    complexity_level: simple

  - block_id: pl_minimal_contour
    role: subject
    category: pose_lock
    kind: single_state
    default_intent: preserve
    text: >-
      Retain only the general silhouette category from the source —
      upright, seated, or reclined outline. The body envelope's broad
      shape stays recognizable but all internal articulation is free.
      Limbs, head, and hands may reposition within the outline class.
    tags:
      intent: preserve
      layer: foreground
      lock: pose
      rigidity: minimal
      approach: contour
      scope: full_body
      mode: any
    complexity_level: simple

  - block_id: pl_minimal_gravity
    role: subject
    category: pose_lock
    kind: single_state
    default_intent: preserve
    text: >-
      Preserve only the base of support and facing direction from the
      source — feet planted in the same stance width, weight on the same
      side. Upper body, arms, head, and hands are completely free to
      reposition. The balance point stays anchored.
    tags:
      intent: preserve
      layer: foreground
      lock: pose
      rigidity: minimal
      approach: gravity
      scope: full_body
      mode: any
    complexity_level: simple

  # ── graduated pose lock — low rigidity ─────────────────────────────

  - block_id: pl_low_skeletal
    role: subject
    category: pose_lock
    kind: single_state
    default_intent: preserve
    text: >-
      Maintain recognizable joint positions from the source pose.
      Shoulder angle, elbow bend, and hip orientation should read as the
      same configuration. Natural motion is allowed — breathing,
      weight shifts, and small limb adjustments keep the pose alive
      without breaking its identity.
    tags:
      intent: preserve
      layer: foreground
      lock: pose
      rigidity: low
      approach: skeletal
      scope: full_body
      mode: any
    complexity_level: simple

  - block_id: pl_low_contour
    role: subject
    category: pose_lock
    kind: single_state
    default_intent: preserve
    text: >-
      The body silhouette from the source should remain recognizable —
      same overall outline shape when viewed from the same angle. Internal
      limb positioning may shift naturally. The outer envelope of the
      figure stays consistent while allowing organic movement within it.
    tags:
      intent: preserve
      layer: foreground
      lock: pose
      rigidity: low
      approach: contour
      scope: full_body
      mode: any
    complexity_level: simple

  - block_id: pl_low_gravity
    role: subject
    category: pose_lock
    kind: single_state
    default_intent: preserve
    text: >-
      Preserve the weight distribution and balance point from the source.
      The center of mass stays over the same support base. Natural sway,
      breathing shifts, and minor postural adjustments are encouraged.
      The figure should feel grounded in the same stance without appearing
      frozen.
    tags:
      intent: preserve
      layer: foreground
      lock: pose
      rigidity: low
      approach: gravity
      scope: full_body
      mode: any
    complexity_level: simple

  - block_id: pl_low_i2v
    role: subject
    category: pose_lock
    kind: single_state
    default_intent: preserve
    text: >-
      Frame-to-frame, the source pose should remain recognizable across
      the clip duration. Joint positions drift naturally with breathing
      and subtle weight shifts. No pose reset or sudden repositioning
      between frames. Continuity is loose but unbroken.
    tags:
      intent: preserve
      layer: foreground
      lock: pose
      rigidity: low
      approach: skeletal
      scope: full_body
      mode: i2v
    complexity_level: simple

  # ── graduated pose lock — medium rigidity ──────────────────────────

  - block_id: pl_medium_skeletal
    role: subject
    category: pose_lock
    kind: single_state
    default_intent: preserve
    text: >-
      Lock the major joint angles from the source — shoulder rotation,
      elbow bend, hip angle, and knee position. Wrists, fingers, and
      head may make small adjustments. The skeletal configuration reads
      as the same pose with only peripheral articulation allowed.
    tags:
      intent: preserve
      layer: foreground
      lock: pose
      rigidity: medium
      approach: skeletal
      scope: full_body
      mode: any
    complexity_level: simple

  - block_id: pl_medium_contour
    role: subject
    category: pose_lock
    kind: single_state
    default_intent: preserve
    text: >-
      The body outline from the source must be preserved — same
      silhouette shape, same limb extension profile, same negative space
      between arms and torso. Only small surface-level shifts within the
      existing envelope are acceptable. The contour is the constraint.
    tags:
      intent: preserve
      layer: foreground
      lock: pose
      rigidity: medium
      approach: contour
      scope: full_body
      mode: any
    complexity_level: simple

  - block_id: pl_medium_gravity
    role: subject
    category: pose_lock
    kind: single_state
    default_intent: preserve
    text: >-
      Anchor the center of mass, lean angle, and weight distribution
      exactly as in the source. The balance structure is fixed — same
      load on each foot, same spinal tilt, same hip shift. Extremities
      may adjust slightly but the gravitational foundation holds.
    tags:
      intent: preserve
      layer: foreground
      lock: pose
      rigidity: medium
      approach: gravity
      scope: full_body
      mode: any
    complexity_level: simple

  - block_id: pl_medium_i2v
    role: subject
    category: pose_lock
    kind: single_state
    default_intent: preserve
    text: >-
      Across the clip duration, hold the source pose structure with no
      accumulated drift. Frame-to-frame joint positions stay within a
      narrow tolerance. Only breathing-scale oscillation is permitted.
      No gradual creep of limb positions over time.
    tags:
      intent: preserve
      layer: foreground
      lock: pose
      rigidity: medium
      approach: skeletal
      scope: full_body
      mode: i2v
    complexity_level: simple

  - block_id: pl_medium_upper_body
    role: subject
    category: pose_lock
    kind: single_state
    default_intent: preserve
    text: >-
      Lock shoulders, arms, torso angle, and head orientation to match
      the source image. Shoulder rotation, elbow position, and spine
      angle are fixed. Hips and legs below the waist are free to shift,
      step, or adjust weight naturally.
    tags:
      intent: preserve
      layer: foreground
      lock: pose
      rigidity: medium
      approach: skeletal
      scope: upper_body
      mode: any
    complexity_level: simple

  - block_id: pl_medium_hands_free
    role: subject
    category: pose_lock
    kind: single_state
    default_intent: preserve
    text: >-
      Lock the full body configuration from the source — torso angle,
      hip alignment, leg position, arm placement, head orientation.
      Only the hands and fingers are free to change position, grip,
      gesture, or interact with objects. All other joints stay fixed.
    tags:
      intent: preserve
      layer: foreground
      lock: pose
      rigidity: medium
      approach: skeletal
      scope: hands_free
      mode: any
    complexity_level: simple

  # ── graduated pose lock — high rigidity ────────────────────────────

  - block_id: pl_high_skeletal
    role: subject
    category: pose_lock
    kind: single_state
    default_intent: preserve
    text: >-
      Reproduce every joint angle from the source precisely. Shoulder
      rotation, elbow bend, wrist angle, hip position, knee flexion,
      and head tilt all match exactly. Only involuntary micro-motion —
      breathing, blink, hair sway — is acceptable. No voluntary
      repositioning of any limb.
    tags:
      intent: preserve
      layer: foreground
      lock: pose
      rigidity: high
      approach: skeletal
      scope: full_body
      mode: any
    complexity_level: simple

  - block_id: pl_high_contour
    role: subject
    category: pose_lock
    kind: single_state
    default_intent: preserve
    text: >-
      The body silhouette must exactly replicate the source outline.
      Every limb extension, body curve, and negative space gap matches
      precisely. The figure's outer boundary is a hard constraint — no
      contour deviation. Internal detail may breathe but the envelope
      is rigid.
    tags:
      intent: preserve
      layer: foreground
      lock: pose
      rigidity: high
      approach: contour
      scope: full_body
      mode: any
    complexity_level: simple

  - block_id: pl_high_gravity
    role: subject
    category: pose_lock
    kind: single_state
    default_intent: preserve
    text: >-
      Weight distribution is precisely locked to the source. Lean angle,
      hip shift, shoulder drop, and spinal curve all reproduce the exact
      balance state. No weight transfer, no postural adjustment, no shift
      in center of mass. The figure holds as if mid-exposure in a
      long photograph.
    tags:
      intent: preserve
      layer: foreground
      lock: pose
      rigidity: high
      approach: gravity
      scope: full_body
      mode: any
    complexity_level: simple

  - block_id: pl_high_i2v
    role: subject
    category: pose_lock
    kind: single_state
    default_intent: preserve
    text: >-
      Frame-to-frame structural lock across the clip duration. Every
      joint holds its source position with zero accumulated drift.
      Only breath-scale chest expansion is permitted. No limb creep,
      no gradual weight shift, no pose evolution over time.
    tags:
      intent: preserve
      layer: foreground
      lock: pose
      rigidity: high
      approach: skeletal
      scope: full_body
      mode: i2v
    complexity_level: simple

  - block_id: pl_high_torso_head
    role: subject
    category: pose_lock
    kind: single_state
    default_intent: preserve
    text: >-
      Lock torso angle, spine curve, shoulder line, and head orientation
      exactly to the source. The core and head are immovable. Arms from
      shoulder down, and legs from hip down, are free to reposition,
      gesture, or shift weight as needed.
    tags:
      intent: preserve
      layer: foreground
      lock: pose
      rigidity: high
      approach: skeletal
      scope: torso_head
      mode: any
    complexity_level: simple

  - block_id: pl_high_lower_free
    role: subject
    category: pose_lock
    kind: single_state
    default_intent: preserve
    text: >-
      Lock everything above the knees to the source — torso, arms, head,
      and upper legs hold their exact positions. Below the knee, lower
      legs and feet may adjust stance width, angle, or foot placement.
      The upper structure is rigid while the base can adapt.
    tags:
      intent: preserve
      layer: foreground
      lock: pose
      rigidity: high
      approach: skeletal
      scope: lower_free
      mode: any
    complexity_level: simple

  # ── graduated pose lock — maximum rigidity ─────────────────────────

  - block_id: pl_maximum_skeletal
    role: subject
    category: pose_lock
    kind: single_state
    default_intent: preserve
    text: >-
      Use the source image as the absolute structural base. Every joint
      angle, limb placement, finger position, torso angle, hip alignment,
      and head orientation is fixed. No posture reinterpretation. The
      environment adapts around the immovable figure.
    tags:
      intent: preserve
      layer: foreground
      lock: pose
      rigidity: maximum
      approach: skeletal
      scope: full_body
      mode: any
    complexity_level: simple

  - block_id: pl_maximum_contour
    role: subject
    category: pose_lock
    kind: single_state
    default_intent: preserve
    text: >-
      Pixel-level fidelity to the source body outline. Every curve,
      limb extension, and negative space gap is an immovable constraint.
      The figure's silhouette is the absolute anchor for the entire
      composition. No contour may shift under any circumstance.
    tags:
      intent: preserve
      layer: foreground
      lock: pose
      rigidity: maximum
      approach: contour
      scope: full_body
      mode: any
    complexity_level: simple

  - block_id: pl_maximum_gravity
    role: subject
    category: pose_lock
    kind: single_state
    default_intent: preserve
    text: >-
      The subject is a fixed structural mass. Every weight distribution
      point, lean angle, balance axis, and pressure line reproduces the
      source exactly. Zero deviation in center of mass. All other scene
      elements conform to this immovable gravitational anchor.
    tags:
      intent: preserve
      layer: foreground
      lock: pose
      rigidity: maximum
      approach: gravity
      scope: full_body
      mode: any
    complexity_level: simple

  - block_id: pl_maximum_i2v
    role: subject
    category: pose_lock
    kind: single_state
    default_intent: preserve
    text: >-
      Absolute structural anchor across the full clip duration. Zero
      frame-to-frame deviation in any joint position. No accumulated
      drift, no breathing motion, no micro-adjustment. The figure is
      a frozen reference point for the entire temporal sequence.
    tags:
      intent: preserve
      layer: foreground
      lock: pose
      rigidity: maximum
      approach: skeletal
      scope: full_body
      mode: i2v
    complexity_level: simple

  # ── camera stability — graduated ──────────────────────────────────

  - block_id: cs_gentle_01
    role: camera
    category: camera_stability
    kind: single_state
    default_intent: modify
    text: >-
      Camera moves dynamically — tracking shots, orbits, and slow drift
      are encouraged. The camera is a storytelling participant, not a
      fixed observer.
    tags:
      lock: camera
      camera_rigidity: low
    complexity_level: simple

  - block_id: cs_gentle_02
    role: camera
    category: camera_stability
    kind: single_state
    default_intent: modify
    text: >-
      Gentle handheld feel. Natural sway and breathing-like rhythm
      in the frame. The shot feels alive, not mechanical.
    tags:
      lock: camera
      camera_rigidity: low
    complexity_level: simple

  - block_id: cs_moderate_01
    role: camera
    category: camera_stability
    kind: single_state
    default_intent: modify
    text: >-
      Slow, deliberate camera movement only. No sudden shifts or
      whip pans. Transitions are smooth and intentional.
    tags:
      lock: camera
      camera_rigidity: medium
    complexity_level: simple

  - block_id: cs_moderate_02
    role: camera
    category: camera_stability
    kind: single_state
    default_intent: modify
    text: >-
      Hold the camera angle with minimal drift. Smooth transitions
      if any movement occurs. The frame stays composed and steady.
    tags:
      lock: camera
      camera_rigidity: medium
    complexity_level: simple

  - block_id: cs_strict_01
    role: camera
    category: camera_stability
    kind: single_state
    default_intent: modify
    text: >-
      Locked tripod. The camera does not move. Only breathing-level
      micro-vibration is acceptable. Frame composition is fixed.
    tags:
      lock: camera
      camera_rigidity: high
    complexity_level: simple

  - block_id: cs_absolute_01
    role: camera
    category: camera_stability
    kind: single_state
    default_intent: modify
    text: >-
      Completely fixed camera. Zero motion, zero drift, zero shake.
      The frame is an immovable window into the scene.
    tags:
      lock: camera
      camera_rigidity: maximum
    complexity_level: simple

  # ═══════════════════════════════════════════════════════════════════
  # STYLE — rendering and atmosphere (reusable across scenes)
  # ═══════════════════════════════════════════════════════════════════

  # ── rendering styles ─────────────────────────────────────────────

  - block_id: ie_style_game_stylized
    role: style
    category: rendering
    kind: single_state
    text: >-
      Rendering inspired by stylized game engines. Strong directional
      lighting creates defined highlight bands along surfaces. Deep shadow
      planes retain visible surface texture. Slightly elevated contrast
      and saturation compared to photographic realism. Clean edges,
      readable silhouettes.
    tags:
      intent: modify
      rendering: game_stylized
      contrast: elevated
      fidelity: stylized
    complexity_level: moderate

  - block_id: ie_style_film_noir
    role: style
    category: rendering
    kind: single_state
    text: >-
      Film noir rendering. High-contrast black and white with selective
      warm tones. Hard shadow lines, venetian blind patterns on walls.
      Cigarette smoke haze in light beams. Grain texture. Faces half-lit.
    tags:
      intent: modify
      rendering: film_noir
      contrast: extreme
      fidelity: stylized
    complexity_level: moderate

  - block_id: ie_style_hyperreal
    role: style
    category: rendering
    kind: single_state
    text: >-
      Hyper-realistic rendering. Every surface texture rendered at maximum
      detail — skin pores, fabric weave, metal scratches. Sharp across
      the entire depth of field. Studio-quality color accuracy.
      No stylization, no filters.
    tags:
      intent: modify
      rendering: hyperreal
      contrast: natural
      fidelity: maximum
    complexity_level: moderate

  # ── atmosphere / tone ────────────────────────────────────────────

  - block_id: ie_tone_romantic_soft
    role: style
    category: atmosphere
    kind: single_state
    text: >-
      Soft romantic atmosphere. Warm diffused light, gentle bokeh in
      background, intimate framing. Relaxed, inviting mood.
      Natural skin tones preserved.
    tags:
      intent: modify
      atmosphere: romantic
      tension: low
      mood: warm
    complexity_level: simple

  - block_id: ie_tone_tense_surveillance
    role: style
    category: atmosphere
    kind: single_state
    text: >-
      Surveillance tension atmosphere. Slightly desaturated palette,
      clinical overhead lighting mixed with security-camera grain.
      Voyeuristic distance, the subject unaware of being observed.
    tags:
      intent: modify
      atmosphere: surveillance
      tension: high
      mood: cold
    complexity_level: moderate

  # ═══════════════════════════════════════════════════════════════════
  # CAMERA — angle and field of view
  # ═══════════════════════════════════════════════════════════════════

  # ── camera angle ─────────────────────────────────────────────────

  - block_id: ie_cam_low_angle
    role: camera
    category: angle
    kind: single_state
    text: >-
      Camera positioned low near floor level, angled upward toward the
      subject. Vertical compression emphasized. The space feels tight
      and enclosed without altering the subject's posture.
    tags:
      intent: modify
      camera_angle: low
      perspective: upward
    complexity_level: simple

  - block_id: ie_cam_eye_level
    role: camera
    category: angle
    kind: single_state
    text: >-
      Camera at eye level, straight on. Neutral perspective with no
      vertical distortion. Natural spatial proportions.
    tags:
      intent: modify
      camera_angle: eye_level
      perspective: neutral
    complexity_level: simple

  - block_id: ie_cam_high_angle
    role: camera
    category: angle
    kind: single_state
    text: >-
      Camera positioned above, angled downward. The subject appears
      smaller in the space, environment visible around them.
      Slight foreshortening of vertical elements.
    tags:
      intent: modify
      camera_angle: high
      perspective: downward
    complexity_level: simple

  - block_id: ie_cam_dutch
    role: camera
    category: angle
    kind: single_state
    text: >-
      Camera tilted at a diagonal angle. Horizon line runs diagonally
      across the frame. Creates unease and visual tension.
    tags:
      intent: modify
      camera_angle: dutch
      perspective: tilted
    complexity_level: simple

  - block_id: ie_cam_over_shoulder_01
    role: camera
    category: angle
    kind: single_state
    text: >-
      Camera positioned slightly over the shoulder of a background figure,
      compressing the space between foreground and midground. The nearer
      shoulder appears softly out of focus in the frame edge. The subject
      remains clearly lit and dominant.
    tags:
      intent: modify
      camera_angle: over_shoulder
      perspective: compressed
    complexity_level: moderate

  - block_id: ie_cam_over_shoulder_02
    role: camera
    category: angle
    kind: single_state
    text: >-
      Shot framed from behind and above a secondary figure's shoulder,
      dark clothing forming a soft blur in the lower-right foreground.
      The subject's workspace and hands are sharp, face in three-quarter
      profile. Primary light catches the subject's features while the
      secondary figure remains in shadow.
    tags:
      intent: modify
      camera_angle: over_shoulder
      perspective: compressed
    complexity_level: moderate

  - block_id: ie_cam_desk_level_01
    role: camera
    category: angle
    kind: single_state
    text: >-
      Camera at surface level, looking across foreground objects toward
      the figures beyond. Nearest objects appear soft and oversized,
      exaggerating depth. Figures occupy the middle distance, the space
      between them compressed by the low angle.
    tags:
      intent: modify
      camera_angle: desk_level
      perspective: low
    complexity_level: moderate

  - block_id: ie_cam_three_quarter_low_01
    role: camera
    category: angle
    kind: single_state
    text: >-
      Camera positioned at hip height, angled slightly upward from a
      three-quarter perspective. The subject dominates the foreground,
      contours emphasised by the low vantage. Midground figures are
      compressed closer by the lens. Background elements read as a
      smaller, separated layer.
    tags:
      intent: modify
      camera_angle: three_quarter_low
      perspective: upward
    complexity_level: moderate

  - block_id: ie_cam_three_quarter_low_02
    role: camera
    category: angle
    kind: single_state
    text: >-
      Low three-quarter camera captures the subject's full silhouette
      from waist to shoulder, clothing lines sharpened by the upward
      perspective. Figures behind appear as near-overlap at this angle,
      partially eclipsed by the subject. Depth compresses background
      partitions and distant elements into a single receding layer.
    tags:
      intent: modify
      camera_angle: three_quarter_low
      perspective: upward
    complexity_level: moderate

  # ── field of view ────────────────────────────────────────────────

  - block_id: ie_fov_narrow
    role: camera
    category: fov
    kind: single_state
    text: >-
      Narrow field of view. Compressed depth, tight framing.
      Background elements appear closer. Telephoto feel.
    tags:
      intent: modify
      fov: narrow
    complexity_level: simple

  - block_id: ie_fov_wide
    role: camera
    category: fov
    kind: single_state
    text: >-
      Wide field of view. Expanded spatial context, more environment
      visible. Slight barrel distortion at edges. Environmental storytelling.
    tags:
      intent: modify
      fov: wide
    complexity_level: simple

  # ═══════════════════════════════════════════════════════════════════
  # LIGHTING — key and fill light sources
  # ═══════════════════════════════════════════════════════════════════

  # ── key light (primary) ─────────────────────────────────────────

  - block_id: ie_key_ceiling_fixtures
    role: lighting
    category: key
    kind: single_state
    text: >-
      Normal indoor lighting from overhead ceiling fixtures.
      Even, bright exposure across the scene.
      Maintain the subject's original light direction and brightness.
      No dramatic shadows. No heavy contrast grading.
    tags:
      intent: modify
      key_light: ceiling
      warmth: neutral
      direction: overhead
      contrast: low
    complexity_level: simple

  - block_id: ie_key_directional_sun
    role: lighting
    category: key
    kind: single_state
    text: >-
      Strong directional sunlight from one side. Clear hard shadows
      on the opposite side. Warm color temperature.
      Highlights on skin and reflective surfaces.
    tags:
      intent: modify
      key_light: sun
      warmth: warm
      direction: side
      contrast: high
    complexity_level: simple

  - block_id: ie_key_neon_ambient
    role: lighting
    category: key
    kind: single_state
    text: >-
      Colored neon ambient lighting from multiple sources.
      Mixed warm and cool tones wash across surfaces.
      No single dominant direction — light wraps around forms.
      Saturated color spill on skin and clothing.
    tags:
      intent: modify
      key_light: neon
      warmth: mixed
      direction: ambient
      contrast: medium
    complexity_level: moderate

  # ── fill light (secondary) ─────────────────────────────────────

  - block_id: ie_fill_cool_slit
    role: lighting
    category: fill
    kind: single_state
    text: >-
      A subtle cool secondary fill from a distant slit window.
      Preserves dimensional separation and prevents silhouette flattening.
    tags:
      intent: modify
      fill_light: cool_slit
      warmth: cool
      purpose: separation
    complexity_level: simple

  - block_id: ie_fill_warm_bounce
    role: lighting
    category: fill
    kind: single_state
    text: >-
      Warm bounce light reflected from nearby surfaces.
      Softens shadow edges without eliminating them.
      Adds warmth to shadow regions.
    tags:
      intent: modify
      fill_light: warm_bounce
      warmth: warm
