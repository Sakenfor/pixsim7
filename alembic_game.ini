# Alembic configuration for PixSim7 Game schema
# Separate migration chain for game-domain tables.
# Uses version_table="alembic_version_game" to track independently from main.

[alembic]
# Path to game migration scripts
script_location = pixsim7/backend/main/infrastructure/database/game_migrations

# Template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
prepend_sys_path = .

version_path_separator = os

# Database URL (overridden by env.py from settings)
sqlalchemy.url = postgresql://pixsim:pixsim123@localhost:5434/pixsim7


[post_write_hooks]

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
