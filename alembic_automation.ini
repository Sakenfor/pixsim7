# Alembic configuration for PixSim7 Automation schema
# Separate migration chain for the automation tables (devices, executions,
# loops, presets) in the automation database.
# Uses version_table="alembic_version_automation" to track independently from
# main, log, and blocks chains.
#
# Plan: automation-package-extraction Phase 2a (engine + alembic plumbing).
# Phase 2c moved table definitions into this chain.
#
# Usage:
#   alembic -c alembic_automation.ini upgrade head
#   alembic -c alembic_automation.ini revision -m "description"

[alembic]
# Path to automation migration scripts
script_location = pixsim7/backend/main/infrastructure/database/automation_migrations

# Template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
prepend_sys_path = .

version_path_separator = os

# Database URL is set at runtime by env.py from settings.automation_database_url_resolved.
# Do not hardcode here — single source of truth lives in pixsim7/backend/main/shared/config.py.


[post_write_hooks]

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
