# Alembic configuration for PixSim7 Block Primitives schema
# Separate migration chain for the block_primitives table in the blocks database.
# Uses version_table="alembic_version_blocks" to track independently from main.
#
# Usage:
#   alembic -c alembic_blocks.ini upgrade head
#   alembic -c alembic_blocks.ini revision -m "description"

[alembic]
# Path to blocks migration scripts
script_location = pixsim7/backend/main/infrastructure/database/blocks_migrations

# Template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
prepend_sys_path = .

version_path_separator = os

# Database URL (overridden by env.py from settings.blocks_database_url)
# Fallback default matches .env BLOCKS_DATABASE_URL
sqlalchemy.url = postgresql://pixsim:pixsim123@localhost:5434/pixsim7_blocks


[post_write_hooks]

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
